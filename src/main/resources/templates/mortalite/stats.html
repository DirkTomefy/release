<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques de mortalité</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9f7f4; color: #3e3e3b; }
        .navbar { background-color: #fff; border-bottom: 1px solid #e2ddd6; }
        .navbar-brand { font-weight: 600; color: #5b4b3a !important; }
        .nav-link { color: #6b5e53 !important; font-weight: 500; }
        .nav-link.active { color: #4a6b3a !important; border-bottom: 2px solid #7a9e5a; }
        .card { border: 1px solid #e7e0d8; border-radius: 12px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .form-control, .form-select { border-color: #e0d8cf; border-radius: 8px; padding: 0.6rem 1rem; }
        .form-control:focus, .form-select:focus { border-color: #b6a88e; box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15); }
        .btn-soft-primary { background-color: #eef3ea; color: #4a6b3a; border: 1px solid #d2ddc4; font-weight: 500; padding: 0.6rem 1rem;}
        .btn-soft-primary:hover { background-color: #dde8d1; color: #3a562c; }
        .summary-card { border-radius: 12px; padding: 1.1rem 1.3rem; }
        .summary-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
        .summary-card .value { font-size: 1.5rem; font-weight: 600; }
        .summary-mortalites { background-color: #fdeceb; }
        .summary-mortalites .label { color: #8a3030; }
        .summary-mortalites .value { color: #6b2222; }
        #chartEmptyState { display: none; }
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('mortalite')}"></th:block>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0"><i class="bi bi-bar-chart-fill me-2" style="color:#b34040;"></i>Statistiques de mortalité</h4>
        <a href="/mortalite" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Retour à la liste
        </a>
    </div>

    <!-- Filtres -->
    <div class="card p-3 p-md-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-12 col-md-3">
                <label class="form-label">Date min</label>
                <input type="date" id="dateDebut" class="form-control">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Date max</label>
                <input type="date" id="dateFin" class="form-control">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label">Race</label>
                <select id="raceId" class="form-select">
                    <option value="">Toutes les races</option>
                    <option th:each="race : ${races}" th:value="${race.id}" th:text="${race.nom}"></option>
                </select>
            </div>
            <div class="col-12 col-md-2 d-grid">
                <button id="btnFiltrer" type="button" class="btn btn-soft-primary">
                    <i class="bi bi-funnel-fill me-1"></i>Filtrer
                </button>
            </div>
        </div>
    </div>

    <!-- Carte de synthèse -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-4">
            <div class="summary-card summary-mortalites">
                <div class="label"><i class="bi bi-heartbreak me-1"></i>Total mortalités</div>
                <div class="value" id="totalMortalites">–</div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="summary-card" style="background-color: #eef5ff;">
                <div class="label"><i class="bi bi-cash-stack me-1"></i>Prix total</div>
                <div class="value" id="totalPrixMortalites">–</div>
            </div>
        </div>
    </div>

    <!-- Histogramme -->
    <div class="card p-3 p-md-4">
        <div id="chartEmptyState" class="text-center text-muted py-5">
            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
            Aucune mortalité sur cette période.
        </div>
        <div id="chartWrapper" style="position: relative; height: 380px;">
            <canvas id="mortaliteChart"></canvas>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const dateDebutInput = document.getElementById('dateDebut');
    const dateFinInput = document.getElementById('dateFin');
    const raceSelect = document.getElementById('raceId');
    const btnFiltrer = document.getElementById('btnFiltrer');

    const totalMortalitesEl = document.getElementById('totalMortalites');
    const totalPrixMortalitesEl = document.getElementById('totalPrixMortalites');
    const chartWrapper = document.getElementById('chartWrapper');
    const chartEmptyState = document.getElementById('chartEmptyState');

    let mortaliteChart = null;

    function formatCurrency(value) {
        return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(value || 0) + ' Ar';
    }

    function chargerStatistiques() {
        const dateDebut = dateDebutInput.value;
        const dateFin = dateFinInput.value;
        const raceId = raceSelect.value;

        const params = new URLSearchParams();
        if (dateDebut) params.set('dateDebut', dateDebut);
        if (dateFin) params.set('dateFin', dateFin);
        if (raceId) params.set('raceId', raceId);

        fetch('/mortalite/stats/data?' + params.toString())
            .then(res => res.json())
            .then(data => afficherResultats(data))
            .catch(() => alert("Impossible de charger les statistiques de mortalité."));
    }

    function afficherResultats(data) {
        totalMortalitesEl.textContent = data.totalMortalites || 0;
        totalPrixMortalitesEl.textContent = formatCurrency(data.totalPrixMortalites);

        const labels = data.labels || [];
        const counts = data.counts || [];
        const prixTotals = data.prixTotals || [];

        if (labels.length === 0) {
            chartWrapper.style.display = 'none';
            chartEmptyState.style.display = 'block';
            return;
        }
        chartWrapper.style.display = 'block';
        chartEmptyState.style.display = 'none';

        const ctx = document.getElementById('mortaliteChart').getContext('2d');

        if (mortaliteChart) {
            mortaliteChart.destroy();
        }

        mortaliteChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Nombre de mortalités',
                        data: counts,
                        backgroundColor: '#c0392b',
                        borderRadius: 4,
                        borderSkipped: false,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Prix total',
                        data: prixTotals,
                        backgroundColor: '#2e86de',
                        borderRadius: 4,
                        borderSkipped: false,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                if (context.datasetIndex === 0) {
                                    return 'Nb mortalités : ' + context.raw;
                                }
                                return 'Prix total : ' + formatCurrency(context.raw);
                            }
                        }
                    },
                    valueLabels: {
                        id: 'valueLabels',
                        afterDatasetsDraw(chart) {
                            const { ctx } = chart;
                            ctx.save();
                            ctx.font = '12px Inter, sans-serif';
                            ctx.fillStyle = '#3e3e3b';
                            ctx.textAlign = 'center';

                            chart.data.datasets.forEach((dataset, datasetIndex) => {
                                const meta = chart.getDatasetMeta(datasetIndex);
                                meta.data.forEach((bar, index) => {
                                    const xPos = bar.x;
                                    const yPos = bar.y - (datasetIndex === 0 ? 8 : 18);
                                    const value = datasetIndex === 0 ? counts[index] : formatCurrency(prixTotals[index]);
                                    ctx.fillText(value, xPos, yPos);
                                });
                            });

                            ctx.restore();
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0 }
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        ticks: {
                            callback: (value) => formatCurrency(value)
                        }
                    }
                }
            }
        });
    }

    btnFiltrer.addEventListener('click', chargerStatistiques);

    // Chargement initial sans filtres (toutes les mortalités)
    chargerStatistiques();
</script>

</body>
</html>
