<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Mortalité</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9f7f4; color: #3e3e3b; }
        .navbar { background-color: #fff; border-bottom: 1px solid #e2ddd6; }
        .navbar-brand { font-weight: 600; color: #5b4b3a !important; }
        .nav-link { color: #6b5e53 !important; font-weight: 500; }
        .nav-link.active { color: #4a6b3a !important; border-bottom: 2px solid #7a9e5a; }
        .card { border: 1px solid #e7e0d8; border-radius: 12px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .table thead th { background-color: #faf8f5; font-weight: 500; color: #6b5e53; border-bottom: 2px solid #e2ddd6; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.04em; }
        .table tbody td { vertical-align: middle; border-bottom: 1px solid #f0ede8; padding-top: 0.85rem; padding-bottom: 0.85rem; }
        .badge-mortalite { background-color: #dc3545; color: #fff; border-radius: 20px; padding: 0.4em 1em; font-weight: 500; font-size: 0.8rem; }
        .btn-soft-primary { background-color: #eef3ea; color: #4a6b3a; border: 1px solid #d2ddc4; font-weight: 500; }
        .btn-soft-primary:hover { background-color: #dde8d1; color: #3a562c; }
        .form-control, .form-select { border-color: #e0d8cf; border-radius: 8px; padding: 0.6rem 1rem; }
        .form-control:focus, .form-select:focus { border-color: #b6a88e; box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15); }
        .page-link { color: #5b4b3a; border: none; border-radius: 8px; margin: 0 2px; }
        .page-item.active .page-link { background-color: #7a9e5a; border-color: #7a9e5a; color: #fff; }
        .page-link:hover { background-color: #f0ede8; color: #3e3e3b; }
        .summary-bar { background-color: #f8f6f2; border-top: 1px solid #e7e0d8; padding: 0.75rem 1.25rem; border-radius: 0 0 12px 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg py-3">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-tree-fill me-2" style="color:#7a9e5a;"></i>Élevage Bovin
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/bovins">Animaux</a></li>
                <li class="nav-item"><a class="nav-link" href="/races">Races</a></li>
                <li class="nav-item"><a class="nav-link" href="/vente/new">Ventes</a></li>
                <li class="nav-item"><a class="nav-link active" href="/mortalite">Mortalité</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-heartbreak-fill me-2" style="color:#b34040;"></i>Registre des mortalités
        </h1>
        <div>
            <a href="/mortalite/stats" class="btn btn-outline-secondary me-2">
                <i class="bi bi-bar-chart-fill me-1"></i> Statistiques
            </a>
            <a href="/mortalite/new" class="btn btn-soft-primary">
                <i class="bi bi-plus-circle me-1"></i> Déclarer une mortalité
            </a>
        </div>
    </div>

    <!-- Filtres de recherche -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/mortalite}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-md-3">
                    <label class="form-label small text-muted">Race</label>
                    <select name="raceId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="r : ${races}" th:value="${r.id}" th:text="${r.nom}"
                                th:selected="${criteria.raceId != null && criteria.raceId == r.id}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Date min</label>
                    <input type="date" name="dateMin" class="form-control" th:value="${criteria.dateMin}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Date max</label>
                    <input type="date" name="dateMax" class="form-control" th:value="${criteria.dateMax}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
                <div class="col-md-1">
                    <a href="/mortalite" class="btn btn-outline-secondary w-100" title="Réinitialiser">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${mortalitePage.totalElements}">0</span> mortalité(s)
                <span class="ms-2">| Page <span th:text="${mortalitePage.number + 1}">1</span> / <span th:text="${mortalitePage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau des mortalités -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Race</th>
                    <th>Prix d'achat</th>
                    <th>Poids au décès</th>
                    <th>Date</th>
                    <th class="text-end">Statut</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${mortalitePage.content}">
                    <td class="text-muted" th:text="${m.id}">1</td>
                    <td th:text="${m.race.nom}">Limousine</td>
                    <td th:text="${#numbers.formatDecimal(m.prix_achat, 0, 2)}">1500.00</td>
                    <td th:text="${#numbers.formatDecimal(m.poids_mort, 0, 1)} + ' kg'">280.0 kg</td>
                    <td th:text="${#dates.format(m.date, 'dd/MM/yyyy')}">15/06/2026</td>
                    <td class="text-end"><span class="badge badge-mortalite">Décédé</span></td>
                </tr>
                <tr th:if="${mortalitePage.content.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">Aucune mortalité enregistrée</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${mortalitePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/mortalite(page=${mortalitePage.number - 1}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, mortalitePage.totalPages - 1)}"
                class="page-item" th:classappend="${i == mortalitePage.number} ? 'active'">
                <a class="page-link" th:href="@{/mortalite(page=${i}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${mortalitePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/mortalite(page=${mortalitePage.number + 1}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
