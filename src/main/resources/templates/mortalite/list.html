<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Mortalité</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('mortalite')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-heartbreak-fill me-2" style="color:#b34040;"></i>Registre des mortalités
        </h1>
        <div>
            <a href="/mortalite/stats" class="btn btn-outline-secondary me-2">
                <i class="bi bi-bar-chart-fill me-1"></i> Statistiques
            </a>
            <a href="/mortalite/new" class="btn btn-soft-primary">
                <i class="bi bi-plus-circle me-1"></i> Déclarer une mortalité
            </a>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Filtres de recherche -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/mortalite}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-auto">
                    <label class="form-label small text-muted">Race</label>
                    <select name="raceId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="r : ${races}" th:value="${r.id}" th:text="${r.nom}"
                                th:selected="${criteria.raceId != null && criteria.raceId == r.id}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="form-label small text-muted">Date min</label>
                    <input type="date" name="dateMin" class="form-control" th:value="${criteria.dateMin}">
                </div>
                <div class="col-auto">
                    <label class="form-label small text-muted">Date max</label>
                    <input type="date" name="dateMax" class="form-control" th:value="${criteria.dateMax}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
                <div class="col-auto">
                    <a href="/mortalite" class="btn btn-outline-secondary w-100" title="Réinitialiser">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${mortalitePage.totalElements}">0</span> mortalité(s)
                <span class="ms-2">| Page <span th:text="${mortalitePage.number + 1}">1</span> / <span th:text="${mortalitePage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau des mortalités -->
    <div class="card">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-borderless mb-0">
                    <thead>
                    <tr>
                        <th style="width: 60px;">#</th>
                        <th>Race</th>
                        <th>Prix d'achat</th>
                        <th>Poids au décès</th>
                        <th>Date</th>
                        <th class="text-end">Statut</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${mortalitePage.content}">
                        <td class="text-muted" th:text="${m.id}">1</td>
                        <td th:text="${m.race.nom}">Limousine</td>
                        <td th:text="${#numbers.formatDecimal(m.prix_achat, 0, 2)}">1500.00</td>
                        <td th:text="${#numbers.formatDecimal(m.poids_mort, 0, 1)} + ' kg'">280.0 kg</td>
                        <td th:text="${#dates.format(m.date, 'dd/MM/yyyy')}">15/06/2026</td>
                        <td class="text-end"><span class="badge badge-mortalite">Décédé</span></td>
                    </tr>
                    <tr th:if="${mortalitePage.content.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">Aucune mortalité enregistrée</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${mortalitePage.totalElements > 0}" class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${mortalitePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/mortalite(page=${mortalitePage.number - 1}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, mortalitePage.totalPages - 1)}"
                class="page-item" th:classappend="${i == mortalitePage.number} ? 'active'">
                <a class="page-link" th:href="@{/mortalite(page=${i}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${mortalitePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/mortalite(page=${mortalitePage.number + 1}, size=${criteria.size}, raceId=${criteria.raceId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
