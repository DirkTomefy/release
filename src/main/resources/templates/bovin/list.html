<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Gestion du troupeau</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

<!-- Navbar -->
    <th:block th:replace="~{fragments/common :: navbar('bovins')}"></th:block>

<!-- Contenu principal -->
<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-egg-fill me-2" style="color:#c4a35a;"></i>Registre des animaux
        </h1>
        <a href="/bovins/achat/form" class="btn btn-soft-primary">
            <i class="bi bi-plus-circle me-1"></i> Nouvel animal
        </a>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>


    <!-- Formulaire de recherche / filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/bovins}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <!-- <input type="hidden" name="size" th:value="${criteria.size}" /> -->

                <div class="col-md-2">
                    <label class="form-label small text-muted">Race</label>
                    <select name="raceId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="r : ${races}" th:value="${r.id}" th:text="${r.nom}"
                                th:selected="${criteria.raceId != null && criteria.raceId == r.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Statut</label>
                    <select name="statut" class="form-select">
                        <option value="tous" th:selected="${criteria.statut == null || criteria.statut == 'tous'}">Tous</option>
                        <option value="non_vendu" th:selected="${criteria.statut == 'non_vendu'}">Non vendu</option>
                        <option value="vendu" th:selected="${criteria.statut == 'vendu'}">Vendu</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Prix achat min</label>
                    <input type="number" step="0.01" name="prixAchatMin" class="form-control" th:value="${criteria.prixAchatMin}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Prix achat max</label>
                    <input type="number" step="0.01" name="prixAchatMax" class="form-control" th:value="${criteria.prixAchatMax}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Poids actuel min</label>
                    <input type="number" step="0.1" name="poidsMin" class="form-control" th:value="${criteria.poidsMin}" placeholder="ex: 200">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Poids actuel max</label>
                    <input type="number" step="0.1" name="poidsMax" class="form-control" th:value="${criteria.poidsMax}" placeholder="ex: 500">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Taille</label>
                    <input type="number" name="size" min="1" step="1" class="form-control" th:value="${criteria.size}" />
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-soft-primary">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Barre de résumé -->
        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${bovinPage.totalElements}">0</span> bovins
                <span class="ms-2">| Page <span th:text="${bovinPage.number + 1}">1</span> / <span th:text="${bovinPage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau des bovins -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Identification</th>
                    <th>Race</th>
                    <th>Date achat</th>
                    <th>Prix achat</th>
                    <th>Poids achat</th>
                    <th>Poids actuel</th>
                    <th>Dernière pesée</th>
                    <th>Statut</th>
                    <th class="text-end" style="width: 120px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="bovin : ${bovinPage.content}">
                    <td class="text-muted" th:text="${bovin.id}">1</td>
                    <td>
                        <span class="fw-medium">Bovin #<span th:text="${bovin.id}"></span></span><br>
                        <small class="text-muted" th:text="'Acheté le ' + ${#dates.format(bovin.dateAchat, 'dd/MM/yyyy')}"></small>
                    </td>
                    <td th:text="${bovin.raceNom}">Limousine</td>
                    <td th:text="${#dates.format(bovin.dateAchat, 'dd/MM/yyyy')}">12/03/2020</td>
                    <td th:text="${#numbers.formatDecimal(bovin.prixAchat, 0, 2)}">1500.00</td>
                    <td class="poids-achat" th:text="${#numbers.formatDecimal(bovin.poidsAchat, 0, 1)} + ' kg'">250.0 kg</td>
                    <td class="poids-actuel">
                        <span th:if="${bovin.poidsActuel != null}" th:text="${#numbers.formatDecimal(bovin.poidsActuel, 0, 1)} + ' kg'">320.5 kg</span>
                        <span th:if="${bovin.poidsActuel == null}" class="text-muted">-</span>
                    </td>
                    <td>
                        <span th:if="${bovin.dateDernierPese != null}" th:text="${#dates.format(bovin.dateDernierPese, 'dd/MM/yyyy')}">15/06/2026</span>
                        <span th:if="${bovin.dateDernierPese == null}" class="text-muted">-</span>
                    </td>
                    <td>
                        <span th:if="${bovin.dateVente == null}" class="badge badge-actif">Actif</span>
                        <span th:if="${bovin.dateVente != null}" class="badge badge-vendu">Vendu</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a href="#" class="btn btn-soft-warning btn-sm me-1" title="Modifier">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/bovins/delete/{id}(id=${bovin.id})}" method="post" class="d-inline"
                                                          onsubmit="return confirm('Déclarer ce bovin comme décédé ? Il sera supprimé du registre et ajouté à la mortalité.');">
                                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                        <button type="submit" class="btn btn-soft-danger btn-sm" title="Supprimer (mortalité)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${bovinPage.content.isEmpty()}">
                    <td colspan="10" class="text-center text-muted py-4">Aucun bovin trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${bovinPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/bovins(page=${bovinPage.number - 1}, size=${criteria.size}, raceId=${criteria.raceId}, statut=${criteria.statut}, prixAchatMin=${criteria.prixAchatMin}, prixAchatMax=${criteria.prixAchatMax}, poidsMin=${criteria.poidsMin}, poidsMax=${criteria.poidsMax})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, bovinPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == bovinPage.number} ? 'active'">
                <a class="page-link" th:href="@{/bovins(page=${i}, size=${criteria.size}, raceId=${criteria.raceId}, statut=${criteria.statut}, prixAchatMin=${criteria.prixAchatMin}, prixAchatMax=${criteria.prixAchatMax}, poidsMin=${criteria.poidsMin}, poidsMax=${criteria.poidsMax})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${bovinPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/bovins(page=${bovinPage.number + 1}, size=${criteria.size}, raceId=${criteria.raceId}, statut=${criteria.statut}, prixAchatMin=${criteria.prixAchatMin}, prixAchatMax=${criteria.prixAchatMax}, poidsMin=${criteria.poidsMin}, poidsMax=${criteria.poidsMax})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
