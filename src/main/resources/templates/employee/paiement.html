<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement employé · Élevage</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }

    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .form-control, .form-select {
      border-color: #e0d8cf;
      border-radius: 8px;
      padding: 0.6rem 1rem;
    }

    .form-control:focus, .form-select:focus {
      border-color: #b6a88e;
      box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15);
    }

    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
    }

    .btn-soft-primary:hover {
      background-color: #dde8d1;
    }

    .btn-soft-danger {
      background-color: #fef1f1;
      color: #b34040;
      border: 1px solid #f5d2d2;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex align-items-center mb-4">
    <a href="#listPage" class="btn btn-soft-primary me-3">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
    <h1 class="h4 fw-semibold mb-0">
      <i class="bi bi-cash-coin me-2" style="color:#7a9e5a;"></i>
      Paiement employé
    </h1>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="card-body">

      <form method="post" action="#">

        <!-- EMPLOYÉ -->
        <div class="mb-3">
          <label class="form-label">Employé</label>
          <select class="form-select" name="employee" required>
            <option value="">Sélectionner un employé...</option>
            <option value="1">Rakoto - Jean</option>
            <option value="2">Rabe - Marie</option>
            <option value="3">Andry - Paul</option>
          </select>
        </div>

        <!-- TYPE PAIEMENT -->
        <div class="mb-3">
          <label class="form-label">Type de paiement</label>
          <select class="form-select" name="type_paiement" required>
            <option value="salaire">Salaire</option>
            <option value="avance">Avance</option>
            <option value="sanction">Sanction</option>
          </select>
        </div>

        <!-- MOIS -->
        <div class="mb-3">
          <label class="form-label">Mois concerné</label>
          <input type="month" class="form-control" name="mois" required>
        </div>

        <!-- CAISSE -->
        <div class="mb-3">
          <label class="form-label">Caisse</label>
          <select class="form-select" name="caisse" required>
            <option value="">Choisir une caisse...</option>
            <option value="1">Caisse principale - 2 500 000 Ar</option>
            <option value="2">Caisse secondaire - 800 000 Ar</option>
            <option value="3">Caisse élevage - 1 200 000 Ar</option>
          </select>
        </div>

        <!-- MONTANT -->
        <div class="mb-4">
          <label class="form-label">Montant</label>
          <input type="number" class="form-control" name="montant" placeholder="Ex: 100000" required>
          <small class="text-muted">
            (Avance possible même si supérieur au salaire — sera déduit progressivement)
          </small>
        </div>

        <!-- ACTIONS -->
        <div class="text-end">
          <button type="reset" class="btn btn-light me-2">Annuler</button>
          <button type="submit" class="btn btn-soft-primary">
            <i class="bi bi-check-circle me-1"></i> Valider paiement
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

</body>
</html>
