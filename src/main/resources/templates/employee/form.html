<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Nouvel Employé</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>

<body>
    <th:block th:replace="~{fragments/common :: navbar('employee')}"></th:block>

    <div id="formEmployeePage">
        <div class="container py-4">

            <div class="d-flex align-items-center mb-4">
                <a href="/employee/list" class="btn btn-soft-primary me-3">
                    <i class="bi bi-arrow-left"></i> Retour
                </a>
                <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
                    <i class="bi bi-person-plus-fill me-2" style="color:#7a9e5a;"></i>
                    Nouvel employé
                </h1>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4 border-0 shadow-sm" role="alert" style="border-radius: 12px;">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/employee/save}" method="POST" th:object="${employeeForm}" id="employeeForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="mb-4 fw-semibold" style="color:#5b4b3a;">
                            <i class="bi bi-person-fill me-2"></i> Informations de l'employé
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nom *</label>
                                <input type="text" th:field="*{nom}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Prénom *</label>
                                <input type="text" th:field="*{prenom}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date de naissance</label>
                                <input type="date" id="dateNaissance" th:field="*{dateNaissance}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date d'entrée *</label>
                                <input type="date" id="dateEntree" th:field="*{dateEntree}" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="mb-4 fw-semibold" style="color:#5b4b3a;">
                            <i class="bi bi-file-earmark-text-fill me-2"></i> Premier contrat
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Date de début *</label>
                                <input type="date" id="dateDebut" th:field="*{dateDebut}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date de fin</label>
                                <input type="date" id="dateFin" th:field="*{dateFin}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Salaire mensuel (Ar) *</label>
                                <input type="number" th:field="*{salaire}" min="0" step="1000" class="form-control" placeholder="0" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-end mt-4">
                    <a href="/employee/list" class="btn btn-light me-2">Annuler</a>
                    <button type="submit" class="btn btn-soft-primary">
                        <i class="bi bi-check-circle me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const dateNaissance = document.getElementById('dateNaissance');
        const dateEntree = document.getElementById('dateEntree');
        const dateDebut = document.getElementById('dateDebut');
        const dateFin = document.getElementById('dateFin');

        dateNaissance.addEventListener('change', function() {
            if (this.value) {
                dateEntree.min = this.value;
            }
        });

        dateEntree.addEventListener('change', function() {
            if (this.value) {
                dateDebut.min = this.value;
                if(!dateNaissance.value) {
                    dateNaissance.max = this.value;
                }
            }
        });

        dateDebut.addEventListener('change', function() {
            if (this.value) {
                dateFin.min = this.value;
                dateEntree.max = this.value;
            }
        });

        function ajusterLimiteAge() {
            const dateNaissanceInput = document.getElementById('dateNaissance'); 
            const dateEntreeInput = document.getElementById('dateEntree');       

            if (!dateNaissanceInput || !dateEntreeInput) return;

            if (dateNaissanceInput.value) {
                const dateNaissance = new Date(dateNaissanceInput.value);
                dateNaissance.setFullYear(dateNaissance.getFullYear() + 18);
                
                const anneeMin = dateNaissance.getFullYear();
                const moisMin = String(dateNaissance.getMonth() + 1).padStart(2, '0');
                const jourMin = String(dateNaissance.getDate()).padStart(2, '0');
                
                dateEntreeInput.min = `${anneeMin}-${moisMin}-${jourMin}`;
                
                if (dateEntreeInput.value && new Date(dateEntreeInput.value) < dateNaissance) {
                    dateEntreeInput.value = "";
                }
            } else {
                dateEntreeInput.removeAttribute('min');
            }
        }

        document.getElementById('dateNaissance')?.addEventListener('change', ajusterLimiteAge);
        ajusterLimiteAge();
    </script>
</body>
</html>
