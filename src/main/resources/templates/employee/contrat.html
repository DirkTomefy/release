<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Contrats de l'employé</title>

    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>

<th:block th:replace="~{fragments/common :: navbar('employee')}"></th:block>

<body>

<div id="listContratPage">
    <div class="container py-4">

        <!-- Message de succès -->
        <div th:if="${successMessage}"
             class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm"
             role="alert"
             style="background-color:#eef3ea;color:#3a562c;border-radius:12px;">
            <div class="d-flex align-items-center">
                <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
                    <i class="bi bi-file-earmark-text-fill me-2"
                       style="color:#7a9e5a;"></i>
                    Liste des contrats
                </h1>

                <p class="text-muted mb-0">
                    Contrats associés à cet employé.
                </p>
            </div>

            <a th:href="@{/employee}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
                Retour
            </a>

        </div>

        <div class="card">
            <div class="card-body p-0">

                <div class="table-responsive">

                    <table class="table align-middle mb-0">

                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date début</th>
                            <th>Date fin</th>
                            <th>Salaire</th>
                            <th>Date création</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:if="${#lists.isEmpty(contrats)}">
                            <td colspan="5"
                                class="text-center text-muted py-4">
                                Aucun contrat trouvé pour cet employé.
                            </td>
                        </tr>

                        <tr th:each="contrat : ${contrats}">

                            <td class="fw-semibold"
                                th:text="${contrat.id}"></td>

                            <td th:text="${#dates.format(contrat.dateDebut,'dd/MM/yyyy')}"></td>

                            <td th:text="${contrat.dateFin != null ?
                                #dates.format(contrat.dateFin,'dd/MM/yyyy')
                                : 'En cours'}">
                            </td>

                            <td th:text="${#numbers.formatDecimal(contrat.salaire,1,'COMMA',2,'POINT')} + ' Ar'">
                            </td>

                            <td th:text="${#dates.format(contrat.dateCreation,'dd/MM/yyyy HH:mm')}">
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
