<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertes paiement · Employés</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }

    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .badge-danger-soft {
      background-color: #fde8e8;
      color: #813838;
      padding: 0.4em 0.8em;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge-warning-soft {
      background-color: #fdf6e8;
      color: #8a6d2e;
      padding: 0.4em 0.8em;
      border-radius: 20px;
      font-weight: 500;
    }

    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
    }

    .table thead th {
      background-color: #faf8f5;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #6b5e53;
    }

    .table tbody td {
      vertical-align: middle;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h4 fw-semibold mb-0">
      <i class="bi bi-exclamation-triangle-fill me-2" style="color:#c45b3a;"></i>
      Employés non payés (mois précédents)
    </h1>

    <a href="#payPage" class="btn btn-soft-primary">
      <i class="bi bi-cash-coin me-1"></i> Paiement
    </a>
  </div>

  <!-- INFO CARD -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex align-items-center">
        <i class="bi bi-info-circle me-2" style="color:#7a9e5a;"></i>
        <small class="text-muted">
          Sont affichés uniquement les employés qui étaient actifs pendant les mois concernés 
          mais dont le paiement n’a pas été effectué.
        </small>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="table-responsive">
      <table class="table table-borderless mb-0">
        <thead>
          <tr>
            <th>Employé</th>
            <th>Mois impayé</th>
            <th>Date entrée</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>

      <tbody>
        <tr th:each="alerte : ${alertes}">
          <td>
            <span class="fw-medium" th:text="${alerte.employee.nom + ' ' + alerte.employee.prenom}">Nom Employé</span><br>
            <small class="text-muted" th:text="'ID: ' + ${alerte.employee.id}">EMP-XXX</small>
          </td>
          <td th:text="${alerte.moisManquant}">Mai 2026</td>
          <td th:text="${#dates.format(alerte.employee.dateEntree, 'dd/MM/yyyy')}">01/01/2026</td>
          <td>
            <span class="badge bg-danger text-white">Non payé</span>
          </td>
          <td>
            <a th:href="@{/employees/payer(id=${alerte.employee.id})}" class="btn btn-sm btn-primary">
              <i class="bi bi-cash"></i> Payer
            </a>
          </td>
        </tr>
      </tbody>
      </table>
    </div>
  </div>

</div>

</body>
</html>
