<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Élevage · Liste des employés</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Police Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }
    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .table thead th {
      background-color: #faf8f5;
      font-weight: 500;
      color: #6b5e53;
      border-bottom: 2px solid #e2ddd6;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
    .table tbody td {
      vertical-align: middle;
      border-bottom: 1px solid #f0ede8;
      padding-top: 0.85rem;
      padding-bottom: 0.85rem;
    }
    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
    }
    .btn-soft-primary:hover {
      background-color: #dde8d1;
      color: #3a562c;
    }
  </style>
</head>

<body>
    <div id="listContratPage">
        <div class="container py-4">
            
            <!-- Message de succès -->
            <div th:if="${successMessage}" 
                class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" 
                role="alert" style="background-color: #eef3ea; color: #3a562c; border-radius: 12px;">
                <div class="d-flex align-items-center">
                    <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
                        <i class="bi bi-file-earmark-text-fill me-2" style="color:#7a9e5a;"></i>
                        Liste des employés
                    </h1>
                    <p class="text-muted mb-0">Consultez les employés enregistrés et gérez leurs contrats.</p>
                </div>
                <a href="/employee/new" class="btn btn-soft-primary">
                    <i class="bi bi-plus-circle me-1"></i>
                    Ajouter un nouvel employé
                </a>
            </div>

            <div class="card">
                <div class="card-body p-0"> <!-- p-0 évite les doubles bordures avec la table -->
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Prénom(s)</th>
                                    <th>Date de naissance</th>
                                    <th>Date d'embauche</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(employees)}">
                                    <td colspan="4" class="text-center text-muted py-4">Aucun employé enregistré pour le moment.</td>
                                </tr>
                                <tr th:each="employeeItem : ${employees}">
                                    <td class="fw-semibold" th:text="${employeeItem.nom != null ? employeeItem.nom : '-'}"></td>
                                    <td th:text="${employeeItem.prenom != null ? employeeItem.prenom : '-'}"></td>
                                    <!-- CORRECTION DES ATTRIBUTS DE DATE -->
                                    <td th:text="${employeeItem.dateNaissance != null ? #dates.format(employeeItem.dateNaissance, 'dd/MM/yyyy') : '-'}"></td>
                                    <td th:text="${employeeItem.dateEntree != null ? #dates.format(employeeItem.dateEntree, 'dd/MM/yyyy') : '-'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (Essentiel pour fermer les alertes avec la petite croix) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
