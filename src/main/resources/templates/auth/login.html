<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · Bovin Élevage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #f4f1ec 0%, #e8e3dc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 2.5rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header .logo {
            width: 70px; height: 70px;
            background: #eef3ea;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.2rem; color: #4a6b3a;
        }
        .login-header h2 { font-weight: 700; color: #2d2d2a; font-size: 1.5rem; margin-bottom: 0.25rem; }
        .login-header p { color: #6b5e53; font-size: 0.95rem; margin: 0; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { font-weight: 500; color: #3e3e3b; font-size: 0.85rem; margin-bottom: 0.4rem; }
        .form-group label i { margin-right: 0.5rem; color: #7a9e5a; }
        .form-control {
            border: 1.5px solid #e2ddd6;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            background: #faf8f5;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #7a9e5a;
            box-shadow: 0 0 0 4px rgba(122, 158, 90, 0.12);
            background: white;
        }
        .input-group-text {
            background: #faf8f5;
            border: 1.5px solid #e2ddd6;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #7a9e5a;
        }
        .input-group .form-control { border-left: none; border-radius: 0 12px 12px 0; }
        .btn-login {
            background: #4a6b3a;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #3a562c;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(74, 107, 58, 0.25);
        }
        .btn-login i { margin-right: 0.5rem; }
        .alert { border-radius: 12px; font-size: 0.9rem; padding: 0.75rem 1rem; }
        .alert-danger { background: #fef1f1; border: 1px solid #f5d2d2; color: #b34040; }
        .alert-success { background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
        .login-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #6b5e53; }
        .credentials-info {
            background: #f8f6f2;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #6b5e53;
            border: 1px dashed #d2ddc4;
        }
        .credentials-info code {
            background: white;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #4a6b3a;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="logo"><i class="bi bi-tree-fill"></i></div>
        <h2>Bovin Élevage</h2>
        <p>Connectez-vous à votre espace</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Erreur de connexion</span>
    </div>

    <div th:if="${message}" class="alert alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}">Message</span>
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
            <label for="username"><i class="bi bi-person"></i> Nom d'utilisateur</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="admin ou gestionnaire" required autofocus>
            </div>
        </div>

        <div class="form-group">
            <label for="password"><i class="bi bi-lock"></i> Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group d-flex justify-content-between align-items-center">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                <label class="form-check-label" for="remember-me" style="font-size:0.85rem; color:#6b5e53;">
                    Se souvenir de moi
                </label>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
        </button>
    </form>

    <!-- Plus de lien "Créer un compte" : inscription réservée à l'admin -->

    <div class="login-footer">
        <span>© 2026 Bovin Élevage · Tous droits réservés</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
