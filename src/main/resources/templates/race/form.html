<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Fiche race</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9f7f4; color: #3e3e3b; }
        .navbar { background-color: #fff; border-bottom: 1px solid #e2ddd6; }
        .navbar-brand { font-weight: 600; color: #5b4b3a !important; }
        .card { border: 1px solid #e7e0d8; border-radius: 12px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .btn-soft-primary { background-color: #eef3ea; color: #4a6b3a; border: 1px solid #d2ddc4; font-weight: 500; }
        .btn-soft-primary:hover { background-color: #dde8d1; color: #3a562c; }
        .form-control { border-color: #e0d8cf; border-radius: 8px; padding: 0.6rem 1rem; }
        .form-control:focus { border-color: #b6a88e; box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15); }
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('races')}"></th:block>

<div class="container py-4" style="max-width: 640px;">
    <div class="d-flex align-items-center mb-4">
        <a href="/races" class="btn btn-soft-primary me-3">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-tag-fill me-2" style="color:#c4a35a;"></i>
            <span th:text="${race.id != null} ? 'Modifier la race' : 'Nouvelle race'">Fiche race</span>
        </h1>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/races/save}" th:object="${race}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input type="text" class="form-control" id="nom" th:field="*{nom}" required>
                </div>
                <div class="mb-3">
                    <label for="descriptions" class="form-label">Description</label>
                    <textarea class="form-control" id="descriptions" th:field="*{descriptions}" rows="3"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/races" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-soft-primary">
                        <i class="bi bi-check-circle me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
