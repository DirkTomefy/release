<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Races</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('races')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-tags-fill me-2" style="color:#c4a35a;"></i>Races
        </h1>
        <a href="/races/form" class="btn btn-soft-primary">
            <i class="bi bi-plus-circle me-1"></i> Nouvelle race
        </a>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Filtres de recherche (sans recherche globale) -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/races}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-md-4">
                    <label class="form-label small text-muted">Nom</label>
                    <input type="text" name="nom" class="form-control" th:value="${criteria.nom}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-muted">Description</label>
                    <input type="text" name="descriptions" class="form-control" th:value="${criteria.descriptions}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
                <div class="col-md-2">
                    <a href="/races" class="btn btn-outline-secondary w-100">Réinitialiser</a>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${racePage.totalElements}">0</span> races
                <span class="ms-2">| Page <span th:text="${racePage.number + 1}">1</span> / <span th:text="${racePage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Nom</th>
                    <th>Description</th>
                    <th class="text-end" style="width: 120px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="race : ${racePage.content}">
                    <td class="text-muted" th:text="${race.id}">1</td>
                    <td class="fw-medium" th:text="${race.nom}">Brahman</td>
                    <td th:text="${race.descriptions}">Race à viande</td>
                    <td class="text-end">
                        <a th:href="@{/races/form/{id}(id=${race.id})}" class="btn btn-soft-warning btn-sm me-1" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/races/delete/{id}(id=${race.id})}" method="post" class="d-inline"
                                                      onsubmit="return confirm('Supprimer cette race ?');">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                    <button type="submit" class="btn btn-soft-danger btn-sm" title="Supprimer">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${racePage.content.isEmpty()}">
                    <td colspan="4" class="text-center text-muted py-4">Aucune race trouvée</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${racePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/races(page=${racePage.number - 1}, size=${criteria.size}, nom=${criteria.nom}, descriptions=${criteria.descriptions})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, racePage.totalPages - 1)}"
                class="page-item" th:classappend="${i == racePage.number} ? 'active'">
                <a class="page-link" th:href="@{/races(page=${i}, size=${criteria.size}, nom=${criteria.nom}, descriptions=${criteria.descriptions})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${racePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/races(page=${racePage.number + 1}, size=${criteria.size}, nom=${criteria.nom}, descriptions=${criteria.descriptions})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
