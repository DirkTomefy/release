<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des matériaux</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }
    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .table {
      border-collapse: separate;
      border-spacing: 0;
    }
    .table thead th {
      background-color: #faf8f5;
      font-weight: 500;
      color: #6b5e53;
      border-bottom: 2px solid #e2ddd6;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding-top: 0.85rem;
      padding-bottom: 0.85rem;
    }
    .table tbody td {
      vertical-align: middle;
      border-bottom: 1px solid #f0ede8;
      padding-top: 0.85rem;
      padding-bottom: 0.85rem;
    }
    .table tbody tr:hover {
      background-color: #fefcf8;
    }
    /* Boutons stylisés d'après le template */
    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-soft-primary:hover {
      background-color: #dde8d1;
      color: #3a562c;
    }
    .btn-soft-warning {
      background-color: #fdf6e8;
      color: #8a6d2e;
      border: 1px solid #eddea4;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-soft-warning:hover {
      background-color: #f7ecce;
      color: #705a20;
    }
  </style>
</head>
<body>

  <div class="container py-4">
    
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
        <i class="bi bi-boxes me-2" style="color:#7a9e5a;"></i>Registre et liste des matériaux
      </h1>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table table-borderless mb-0">
          <thead>
            <tr>
              <th style="width: 80px;" class="ps-4">ID</th>
              <th>Type de matériel</th>
              <th>Libellé</th>
              <th>Type de gestion</th>
              <th>Quantité restante</th>
              <th class="text-end pe-4" style="width: 320px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="materiel : ${materielStockDtos}">
              <td class="text-muted ps-4" th:text="${materiel.getMateriel().getId()}">1</td>
              
              <td>
                <span class="fw-medium" th:text="${materiel.getMateriel().getType().getLibelle()}">Alimentation</span>
              </td>
              
              <td th:text="${materiel.getMateriel().getLibelle()}">Foin de luzerne Premium</td>
              
              <td>
                <small class="text-muted" th:text="${materiel.getMateriel().getTypeGestion()}">UNITAIRE</small>
              </td>
              
              <td>
                <span class="fw-semibold" style="color: #4a6b3a;" th:text="${materiel.getQuantiteRestant()}">45</span>
              </td>
              
              <td class="text-end pe-4">
                <a th:href="@{/materiel/{id}(id=${materiel.getMateriel().getId()})}" class="btn btn-soft-warning btn-sm me-2">
                  <i class="bi bi-eye me-1"></i> Voir Détails
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
