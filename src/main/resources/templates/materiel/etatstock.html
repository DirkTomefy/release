<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · État de stock matériel</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .field-group label { font-size: 0.8rem; color: #6b5e53; margin-bottom: 0.3rem; display: block; }
        .field-group label i { color: #b6a88e; margin-right: 0.3rem; }
        .chart-card { padding: 1.5rem; }
        .chart-wrap { position: relative; height: 380px; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #9c9188; }
        .empty-state i { font-size: 2.5rem; color: #d2ddc4; margin-bottom: 0.75rem; display: block; }
        .field-group select:disabled { background-color: #f5f2ec; cursor: not-allowed; }
        .field-group .spinner-border-sm { display: none; margin-left: 0.4rem; }
        .field-group.loading .spinner-border-sm { display: inline-block; }
    </style>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('materiel')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-bar-chart-fill me-2" style="color:#c4a35a;"></i>État de stock des matériels
        </h1>
    </div>

    <!-- Formulaire de filtre -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/materiel/etatstock}" th:object="${criteria}" method="get" class="row g-3 align-items-end">

                <div class="col-md-3 field-group">
                    <label for="idTypeMateriel"><i class="bi bi-tags-fill"></i>Type matériel</label>
                    <select id="idTypeMateriel" th:field="*{idTypeMateriel}" class="form-select">
                        <option value="">Tous</option>
                        <option th:each="tm : ${typeMateriels}" th:value="${tm.id}" th:text="${tm.libelle}"></option>
                    </select>
                </div>

                <div class="col-md-3 field-group" id="materielGroup">
                    <label for="idMateriel">
                        <i class="bi bi-tools"></i>Matériel
                        <span class="spinner-border spinner-border-sm text-success" role="status"></span>
                    </label>
                    <select id="idMateriel" th:field="*{idMateriel}" class="form-select" th:attr="data-selected=${criteria.idMateriel}">
                        <option value="">Tous</option>
                        <option th:each="m : ${materiels}" th:value="${m.id}" th:text="${m.libelle}"></option>
                    </select>
                </div>

                <div class="col-md-2 field-group">
                    <label for="dateDebut"><i class="bi bi-calendar-event"></i>Date début</label>
                    <input type="date" th:field="*{dateDebut}" class="form-control" required />
                </div>

                <div class="col-md-2 field-group">
                    <label for="dateFin"><i class="bi bi-calendar-event"></i>Date fin</label>
                    <input type="date" th:field="*{dateFin}" class="form-control" required />
                </div>

                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-soft-primary flex-fill">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                    <button type="reset" class="btn btn-soft-danger" id="resetBtn">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Graphique -->
    <div class="card chart-card">
        <div class="chart-wrap">
            <canvas id="monChart"></canvas>
        </div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <i class="bi bi-inbox"></i>
            <span class="empty-message">Aucune donnée pour cette période</span>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const typeSelect = document.getElementById('idTypeMateriel');
    const materielSelect = document.getElementById('idMateriel');
    const materielGroup = document.getElementById('materielGroup');

    // Valeur sélectionnée au chargement (utile après un submit avec filtres déjà appliqués)
    const selectedMaterielId = materielSelect.dataset.selected || '';

    async function loadMateriels(typeId, preserveSelection) {
        // Réinitialise la liste
        materielSelect.innerHTML = '<option value="">Tous</option>';

        if (!typeId) {
            // Aucun type choisi -> pas d'appel API, on laisse "Tous"
            return;
        }

        materielGroup.classList.add('loading');
        materielSelect.disabled = true;

        try {
            const response = await fetch(`/api/materiels/type/${typeId}`);

            if (response.status === 204) {
                // Aucun matériel pour ce type
                return;
            }

            if (!response.ok) {
                throw new Error('Erreur lors du chargement des matériels');
            }

            const materiels = await response.json();

            materiels.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.libelle;
                if (preserveSelection && String(m.id) === String(preserveSelection)) {
                    option.selected = true;
                }
                materielSelect.appendChild(option);
            });

        } catch (err) {
            console.error(err);
        } finally {
            materielGroup.classList.remove('loading');
            materielSelect.disabled = false;
        }
    }

    // Au changement du type -> recharge la liste des matériels (sans conserver l'ancienne sélection)
    typeSelect.addEventListener('change', () => {
        loadMateriels(typeSelect.value, null);
    });

    // Au chargement initial : si un type est déjà sélectionné (retour de filtre), on recharge
    // la liste correspondante en conservant le matériel sélectionné
    document.addEventListener('DOMContentLoaded', () => {
        if (typeSelect.value) {
            loadMateriels(typeSelect.value, selectedMaterielId);
        }
    });

    // Reset du formulaire -> on vide aussi la liste des matériels
    document.getElementById('resetBtn').addEventListener('click', () => {
        setTimeout(() => {
            materielSelect.innerHTML = '<option value="">Tous</option>';
        }, 0);
    });

    // ---- Chart.js ----
    const labels = /*[[${labels}]]*/ [];
    const valeurs = /*[[${values}]]*/ [];

    // Cas 1 : aucune ligne du tout
    const aucuneDonnee = !labels.length;

    // Cas 2 : des lignes existent (ex: dates) mais toutes les quantités valent 0
    const toutEstZero = labels.length > 0 && valeurs.every(v => Number(v) === 0);

    const emptyStateEl = document.getElementById('emptyState');
    const chartEl = document.getElementById('monChart');

    if (aucuneDonnee || toutEstZero) {
        emptyStateEl.style.display = 'block';
        chartEl.style.display = 'none';

        const messageEl = emptyStateEl.querySelector('.empty-message');
        if (toutEstZero) {
            messageEl.textContent = 'Aucun mouvement de stock enregistré pour cette période';
        } else {
            messageEl.textContent = 'Aucune donnée pour cette période';
        }
    } else {
        const ctx = chartEl.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 380);
        gradient.addColorStop(0, 'rgba(122, 158, 90, 0.55)');
        gradient.addColorStop(1, 'rgba(122, 158, 90, 0.05)');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Quantité',
                    data: valeurs,
                    backgroundColor: gradient,
                    borderColor: '#7a9e5a',
                    borderWidth: 1.5,
                    borderRadius: 8,
                    maxBarThickness: 48
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#fff',
                        titleColor: '#3e3e3b',
                        bodyColor: '#6b5e53',
                        borderColor: '#e2ddd6',
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 8,
                        displayColors: false
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#6b5e53', font: { family: 'Inter' } }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: '#f0ede8' },
                        ticks: { color: '#6b5e53', font: { family: 'Inter' } }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
