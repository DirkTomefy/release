<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐄 Mouvement entrée de stock</title>

    <th:block th:replace="~{fragments/common :: assets}"></th:block>

    </head>

<body>

    <th:block th:replace="~{fragments/common :: navbar('materiel')}"></th:block>

    <div class="container pb-5">
        <div class="card-modern">
            <div class="header-section">
                <h1><i class="fas fa-exchange-alt"></i> Gestion des mouvements de stock</h1>
                <div class="badge-engrais" id="mvtBadge">
                    <i class="fas fa-calendar-plus"></i> Nouveau mouvement
                </div>
            </div>

            <form id="mouvementForm" onsubmit="return false;">
                <div class="form-grid">

                    <div class="field-group" style="grid-column: span 2;">
                        <label for="typeMouvement"><i class="fas fa-directions"></i> Type de mouvement</label>
                        <select id="typeMouvement" name="typeMouvement"
                            style="font-weight: 600; background-color: #fcfaf7;">
                            <option value="ENTREE">ENTREE (Approvisionnement / Achat)</option>
                            <option value="SORTIE">SORTIE (Utilisation / Consommation)</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label for="materielTypeId"><i class="fas fa-tag"></i> Type de matériel</label>
                        <select id="materielTypeId" name="materielTypeId">
                            <option th:each="type : ${materielTypes}" th:value="${type.id}" th:text="${type.libelle}">
                            </option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label for="materielId"><i class="fas fa-box"></i> Matériel</label>
                        <select id="materielId" name="materielId">
                            <option th:each="materiel : ${materiels}" th:value="${materiel.id}"
                                th:text="${materiel.libelle}"></option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label for="dateMouvement"><i class="fas fa-calendar-day"></i> Date du mouvement</label>
                        <input type="date" id="dateMouvement" name="dateMouvement" required />
                    </div>

                    <div class="field-group">
                        <label for="quantite"><i class="fas fa-hashtag"></i> Quantité</label>
                        <input type="number" id="quantite" name="quantite" placeholder="ex: 5" min="1" value="3" />
                    </div>

                    <div class="field-group entry-only">
                        <label for="pu"><i class="fas fa-dollar-sign"></i> P.U estimé (Ar)</label>
                        <input type="number" id="pu" placeholder="ex: 1250" step="0.01" min="0" value="" />
                    </div>

                    <div class="field-group entry-only">
                        <label for="total"><i class="fas fa-calculator"></i> Total entrée (est.)</label>
                        <input type="text" id="total" readonly value="" />
                    </div>

                    <div class="payment-section entry-only" style="grid-column: span 2;">
                        <div class="payment-header">
                            <div class="payment-title">
                                <i class="fas fa-hand-holding-dollar"></i>
                                Modes de paiement
                                <span class="pay-count-badge" id="payCountBadge">1 ligne</span>
                            </div>
                            <button type="button" class="btn-add-payment" id="addPaymentBtn">
                                <i class="fas fa-plus-circle"></i> Ajouter ligne
                            </button>
                        </div>

                        <div class="payment-list" id="paymentList">
                            <div class="payment-row" data-row-id="1">
                                <div class="pay-select">
                                    <select class="pay-type">
                                        <option th:each="caisse : ${caisses}" th:value="${caisse.id}"
                                            th:text="${caisse.libelle}"></option>
                                    </select>
                                </div>
                                <div class="pay-montant">
                                    <input type="number" class="pay-amount" placeholder="0.00" step="0.01" min="0"
                                        value="1200" />
                                </div>
                                <button type="button" class="btn-remove-pay" disabled>
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex gap-3 flex-wrap mt-2" style="font-size:0.8rem; color:#6b5e53;">
                            <span><i class="fas fa-info-circle text-muted"></i> Chaque ligne = un mode de
                                paiement</span>
                            <span><i class="fas fa-arrow-right text-muted"></i> Total = somme des montants</span>
                        </div>
                    </div>

                    <div class="total-highlight entry-only" id="totalHighlightContainer" style="grid-column: span 2;">
                        <span><i class="fas fa-coins"></i> Total paiements enregistrés</span>
                        <span class="total-value" id="totalDisplay">1 200,00 Ar</span>
                    </div>
                </div>

                <div class="actions-row">
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" id="validerBtn">
                            <i class="fas fa-check-circle"></i> Valider le mouvement
                        </button>
                        <button type="reset" class="btn btn-outline" id="resetBtn">
                            <i class="fas fa-undo-alt"></i> Réinitialiser
                        </button>
                    </div>
                    <span
                        style="font-size:0.85rem; color:#5b4b3a; background:#f0e6d3; padding:0.4rem 1.2rem; border-radius:40px; font-weight: 500;">
                        <i class="far fa-clock"></i> Prêt
                    </span>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <script th:inline="javascript">
        document.getElementById('materielTypeId').addEventListener('change', function () {
            const typeId = this.value;
            fetch('/api/materiels/type/' + typeId)
                .then(response => response.json())
                .then(data => {
                    const materielSelect = document.getElementById('materielId');
                    materielSelect.innerHTML = '';
                    data.forEach(materiel => {
                        const option = document.createElement('option');
                        option.value = materiel.id;
                        option.textContent = materiel.libelle;
                        materielSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Erreur lors de la recuperation des materiels :', error));
        });

        (function () {
            const caisses = /*[[${caisses}]]*/[];
            const typeMouvementInput = document.getElementById('typeMouvement');
            const mvtBadge = document.getElementById('mvtBadge');
            const paymentList = document.getElementById('paymentList');
            const addPaymentBtn = document.getElementById('addPaymentBtn');
            const payCountBadge = document.getElementById('payCountBadge');
            const totalDisplay = document.getElementById('totalDisplay');
            const totalHighlightContainer = document.getElementById('totalHighlightContainer');
            const totalInput = document.getElementById('total');
            const puInput = document.getElementById('pu');
            const qteInput = document.getElementById('quantite');
            const dateInput = document.getElementById('dateMouvement');
            const validerBtn = document.getElementById('validerBtn');
            const resetBtn = document.getElementById('resetBtn');
            const toast = document.getElementById('toast');
            let rowCounter = 1;

            if (!dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }

            // Gestion de la visibilite dynamique selon ENTREE ou SORTIE
            function toggleFieldsByMovementType() {
                const type = typeMouvementInput.value;
                const entryElements = document.querySelectorAll('.entry-only');

                if (type === 'SORTIE') {
                    entryElements.forEach(el => el.style.display = 'none');
                    mvtBadge.innerHTML = '<i class="fas fa-calendar-minus"></i> Nouvelle sortie';
                    mvtBadge.className = 'badge-sortie'; // Assure-toi que cette classe CSS reste accessible
                } else {
                    entryElements.forEach(el => el.style.display = '');
                    mvtBadge.innerHTML = '<i class="fas fa-calendar-plus"></i> Nouvelle entree';
                    mvtBadge.className = 'badge-engrais';
                    updateBovinTotal();
                }
            }

            typeMouvementInput.addEventListener('change', toggleFieldsByMovementType);

            function getPaymentRows() {
                return paymentList.querySelectorAll('.payment-row');
            }

            function getPaymentTotal() {
                let sum = 0;
                getPaymentRows().forEach(row => {
                    const amt = parseFloat(row.querySelector('.pay-amount').value) || 0;
                    sum += amt;
                });
                return sum;
            }

            function updateBovinTotal() {
                if (typeMouvementInput.value === 'SORTIE') return;
                const pu = parseFloat(puInput.value) || 0;
                const qte = parseFloat(qteInput.value) || 0;
                const total = pu * qte;
                totalInput.value = total.toFixed(2);
                updateGlobalDisplay();
            }

            function updateGlobalDisplay() {
                if (typeMouvementInput.value === 'SORTIE') return;
                const sum = getPaymentTotal();
                totalDisplay.textContent = sum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' Ar';

                const bovinTotal = parseFloat(totalInput.value) || 0;

                if (Math.abs(sum - bovinTotal) < 0.01 && bovinTotal > 0) {
                    totalHighlightContainer.style.color = '#3d5a2e';
                    totalHighlightContainer.style.backgroundColor = '#e2f0da';
                    totalHighlightContainer.style.borderColor = '#d2ddc4';
                } else {
                    totalHighlightContainer.style.color = '#813838';
                    totalHighlightContainer.style.backgroundColor = '#fde8e8';
                    totalHighlightContainer.style.borderColor = '#f5d2d2';
                }

                const count = getPaymentRows().length;
                payCountBadge.textContent = count + ' ligne' + (count > 1 ? 's' : '');
            }

            function createPaymentRow(rowId) {
                const row = document.createElement('div');
                row.className = 'payment-row';
                row.dataset.rowId = rowId;
                row.innerHTML = `
            <div class="pay-select">
              <select class="pay-type">
                ${caisses.map(caisse => `<option value="${caisse.id}">${caisse.libelle}</option>`).join('')}
              </select>
            </div>
            <div class="pay-montant">
              <input type="number" class="pay-amount" placeholder="0.00" step="0.01" min="0" value="0">
            </div>
            <button type="button" class="btn-remove-pay">
              <i class="fas fa-trash-alt"></i>
            </button>
          `;
                return row;
            }

            function attachRowEvents(row) {
                const amountInput = row.querySelector('.pay-amount');
                amountInput.addEventListener('input', updateGlobalDisplay);

                const removeBtn = row.querySelector('.btn-remove-pay');
                removeBtn.addEventListener('click', function () {
                    if (getPaymentRows().length <= 1) {
                        alert('Il doit rester au moins une ligne de paiement.');
                        return;
                    }
                    row.remove();
                    updateGlobalDisplay();
                    updateRemoveButtons();
                });
            }

            function updateRemoveButtons() {
                const rows = getPaymentRows();
                rows.forEach((row) => {
                    const btn = row.querySelector('.btn-remove-pay');
                    btn.disabled = (rows.length <= 1);
                });
            }

            addPaymentBtn.addEventListener('click', function () {
                rowCounter++;
                const newRow = createPaymentRow(rowCounter);
                paymentList.appendChild(newRow);
                attachRowEvents(newRow);
                updateGlobalDisplay();
                updateRemoveButtons();
                newRow.style.animation = 'fadeIn 0.25s ease';
            });

            function initExistingRows() {
                getPaymentRows().forEach(row => attachRowEvents(row));
                updateRemoveButtons();
                updateGlobalDisplay();
            }

            puInput.addEventListener('input', updateBovinTotal);
            qteInput.addEventListener('input', updateBovinTotal);

            resetBtn.addEventListener('click', function () {
                setTimeout(() => {
                    if (!dateInput.value) {
                        dateInput.value = new Date().toISOString().split('T')[0];
                    }
                    toggleFieldsByMovementType();
                }, 50);
            });

            validerBtn.addEventListener('click', function () {
                const typeMouvement = typeMouvementInput.value;
                const { value: matVal } = document.getElementById('materielId');
                const mId = parseInt(matVal);
                const quantite = parseInt(qteInput.value) || 0;
                const dateMouvement = dateInput.value;

                if (!dateMouvement) { alert('Veuillez saisir une date de mouvement.'); return; }
                if (!mId || mId < 1) { alert('Veuillez selectionner un materiel valide.'); return; }
                if (quantite <= 0) { alert('La quantite doit etre superieure a 0.'); return; }

                // Construction conditionnelle du payload unique
                const payload = {
                    typeMouvement: typeMouvement,
                    materielId: mId,
                    quantite: quantite,
                    dateMouvement: dateMouvement,
                    prixUnitaire: null,
                    payments: []
                };

                if (typeMouvement === 'ENTREE') {
                    const pu = parseFloat(puInput.value) || 0;
                    if (pu <= 0) { alert('Le prix unitaire doit etre superieur a 0 pour une entree.'); return; }
                    payload.prixUnitaire = pu;

                    const payments = [];
                    getPaymentRows().forEach(row => {
                        const caisseId = parseInt(row.querySelector('.pay-type').value);
                        const montant = parseFloat(row.querySelector('.pay-amount').value) || 0;
                        if (montant > 0) {
                            payments.push({ caisseId, montant });
                        }
                    });

                    if (payments.length === 0) { alert('Ajoutez au moins un paiement avec un montant > 0.'); return; }

                    // Securite: Verifier la correspondance des sommes
                    const totalEstime = pu * quantite;
                    const totalPaye = getPaymentTotal();
                    if (Math.abs(totalEstime - totalPaye) > 0.01) {
                        alert('Le total des paiements doit correspondre exactement au total estime (' + totalEstime.toFixed(2) + ' Ar).');
                        return;
                    }

                    payload.payments = payments;
                }

                // Endpoint unique pour le traitement des deux flux
                const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

                fetch('/mouvement/form/valider', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(csrfToken && csrfHeader ? { [csrfHeader]: csrfToken } : {})
                    },
                    body: JSON.stringify(payload)
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            showToast(data.message, 'success');
                            if (typeMouvement === 'ENTREE') {
                                // Reinitialisation des paiements si succes
                                paymentList.innerHTML = '';
                                rowCounter = 1;
                                paymentList.appendChild(createPaymentRow(rowCounter));
                                initExistingRows();
                            }
                            document.getElementById('mouvementForm').reset();
                            dateInput.value = new Date().toISOString().split('T')[0];
                            toggleFieldsByMovementType();
                        } else {
                            showToast('Erreur : ' + data.message, 'error');
                        }
                    })
                    .catch(error => {
                        console.error('Erreur reseau:', error);
                        showToast('Erreur de communication avec le serveur.', 'error');
                    });
            });

            function showToast(message, type) {
                toast.textContent = message;
                toast.className = 'toast-message show' + (type === 'error' ? ' error' : '');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 6000);
            }

            initExistingRows();
            toggleFieldsByMovementType();
        })();
    </script>
</body>

</html>
