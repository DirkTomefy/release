<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Gestion du troupeau</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/common :: navbar('peseBovin')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="me-2" style="color:#c4a35a;"></i>Liste des pesées des bovins
        </h1>
        <a th:href="@{/peseBovin/form}" class="btn btn-soft-primary">
            <i class="bi bi-plus-circle me-1"></i> Nouvelle pesée
        </a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/peseBovin/list}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                
                
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date debut </label>
                    <input type="date" name="datePeseMin" class="form-control" th:value="${criteria.datePeseMin}" >
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date fin</label>
                    <input type="date" name="datePeseMax" class="form-control" th:value="${criteria.datePeseMax}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Statut</label>
                    <select name="statut" class="form-select">
                        <option value="tous" th:selected="${criteria.statut == null || criteria.statut == 'tous'}">Tous</option>
                        <option value="non_vendu" th:selected="${criteria.statut == 'non_vendu'}">Non vendu</option>
                        <option value="vendu" th:selected="${criteria.statut == 'vendu'}">Vendu</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Poids min</label>
                    <input type="number" step="0.01" name="poidsApresMin" class="form-control" th:value="${criteria.poidsApresMin}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Poids max</label>
                    <input type="number" step="0.01" name="poidsApresMax" class="form-control" th:value="${criteria.poidsApresMax}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-soft-primary w-100" title="Filtrer">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between" th:if="${pesePage != null}">
            <div class="text-muted small">
                <span th:text="${pesePage.totalElements}">0</span> enregistrements
                <span class="ms-2">| Page <span th:text="${pesePage.number + 1}">1</span> / <span th:text="${pesePage.totalPages}">1</span></span>
            </div>
            <div class="d-flex align-items-center">
                <label class="form-label me-2 mb-0 small text-muted" for="pageSizeInput">Taille :</label>
                <form th:action="@{/peseBovin/list}" method="get" class="d-inline-flex align-items-center">
                    <input type="hidden" name="raceId" th:value="${criteria.raceId}" />
                    <input type="hidden" name="statut" th:value="${criteria.statut}" />
                    <input type="hidden" name="poidsApresMin" th:value="${criteria.poidsApresMin}" />
                    <input type="hidden" name="poidsApresMax" th:value="${criteria.poidsApresMax}" />
                    <input type="hidden" name="page" value="0" />
                    <input type="number" name="size" id="pageSizeInput" min="1" step="1"
                           class="form-control form-control-sm d-inline-block me-2" style="width: 60px;" th:value="${criteria.size}" />
                    <button type="submit" class="btn btn-sm btn-soft-primary">OK</button>
                </form>
            </div>
        </div>
    </div> 

    <div class="card table-container">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>ID Bovin</th>
                    <th>Date de pesée</th>
                    <th>Poids (kg)</th>
                    <th class="text-end" style="width: 180px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="peseBovin : ${pesesBovin}">
                    <td class="text-muted" th:text="${peseBovin.id}">1</td>
                    <td>
                        <span class="fw-medium">Bovin #<span th:text="${peseBovin.bovin.id}"></span></span><br>
                        <small class="text-muted" th:text="'Race : ' + ${peseBovin.bovin.race?.nom}"></small>
                    </td>
                    <td th:text="${#dates.format(peseBovin.date_pese, 'dd/MM/yyyy')}">-</td>
                    <td th:text="${#numbers.formatDecimal(peseBovin.poids_apres, 0, 2)}">-</td>
                    <td class="text-end">
                        <a th:href="@{'/peseBovin/detail/' + ${peseBovin.bovin.id}}" 
                           class="btn btn-soft-success btn-sm me-1" 
                           title="Voir les statistiques d'évolution">
                            <i class="bi bi-graph-up"></i>
                        </a>
                        <a th:href="@{'/peseBovin/form/' + ${peseBovin.id}}" 
                           class="btn btn-soft-warning btn-sm me-1" 
                           title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${pesesBovin == null || pesesBovin.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Aucune pesée trouvée</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" aria-label="Pagination" th:if="${pesePage != null && pesePage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${pesePage.first} ? 'disabled'">
                <a class="page-link px-3" th:href="@{/peseBovin/list(page=${pesePage.number - 1}, size=${criteria.size}, raceId=${criteria.raceId}, datePeseMin=${criteria.datePeseMin}, datePeseMax=${criteria.datePeseMax}, statut=${criteria.statut}, poidsApresMin=${criteria.poidsApresMin}, poidsApresMax=${criteria.poidsApresMax})}">Précédent</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, pesePage.totalPages - 1)}" class="page-item" th:classappend="${i == pesePage.number} ? 'active'">
                <a class="page-link" th:href="@{/peseBovin/list(page=${i}, size=${criteria.size} , raceId=${criteria.raceId}, datePeseMin=${criteria.datePeseMin}, datePeseMax=${criteria.datePeseMax}, statut=${criteria.statut}, poidsApresMin=${criteria.poidsApresMin}, poidsApresMax=${criteria.poidsApresMax})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${pesePage.last} ? 'disabled'">
                <a class="page-link px-3" th:href="@{/peseBovin/list(page=${pesePage.number + 1}, size=${criteria.size} , raceId=${criteria.raceId}, datePeseMin=${criteria.datePeseMin}, datePeseMax=${criteria.datePeseMax}, statut=${criteria.statut}, poidsApresMin=${criteria.poidsApresMin}, poidsApresMax=${criteria.poidsApresMax})}">Suivant</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
