<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐄 Achat de bovins</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
    </head>
  <body>
    <th:block th:replace="~{fragments/common :: navbar('bovins')}"></th:block>

    <div class="page-wrapper">
    <div class="card-modern">
      <!-- En-tête -->
      <div class="header-section">
        <h1><i class="fas fa-cow"></i> Achat de bovins</h1>
        <div class="badge-engrais">
          <i class="fas fa-calendar-plus"></i> Nouvelle entrée
        </div>
      </div>

      <!-- Formulaire -->
      <form id="bovinForm" onsubmit="return false;">
        <div class="form-grid">
          <!-- Race (DYNAMIQUE depuis la BDD) -->
          <div class="field-group">
            <label for="raceId"><i class="fas fa-tag"></i> Race</label>
            <select id="raceId" name="raceId" th:field="${buyRequest.raceId}">
              <option th:each="race : ${races}" th:value="${race.id}" th:text="${race.nom}"></option>
            </select>
          </div>

          <!-- Date d'achat -->
          <div class="field-group">
            <label for="dateAchat"
              ><i class="fas fa-calendar-day"></i> Date d'achat</label
            >
            <input type="date" id="dateAchat" name="dateAchat" th:field="${buyRequest.dateAchat}" required />
          </div>

          <!-- Quantité -->
          <div class="field-group">
            <label for="quantite"
              ><i class="fas fa-hashtag"></i> Quantité</label
            >
            <input
              type="number"
              id="quantite"
              name="quantite"
              placeholder="ex: 5"
              min="1"
              th:field="${buyRequest.quantite}"
            />
          </div>

          <!-- Prix unitaire -->
          <div class="field-group">
            <label for="prixUnitaire"
              ><i class="fas fa-dollar-sign"></i> Prix unitaire (€)</label
            >
            <input
              type="number"
              id="prixUnitaire"
              name="prixUnitaire"
              placeholder="ex: 1250.00"
              step="0.01"
              min="0.01"
              required
            />
          </div>

          <!-- POIDS INITIALS A L'ACHAT -->
          <div class="field-group">
            <label for="poidsAchat"
              ><i class="fas fa-weight-hanging"></i> Poids à l'achat (kg)</label
            >
            <input
              type="number"
              id="poidsAchat"
              name="poidsAchat"
              placeholder="ex: 350.5"
              step="0.01"
              min="1"
              th:field="${buyRequest.poidsAchat}"
              required
            />
          </div>

          <!-- Total bovin (calculé) -->
          <div class="field-group">
            <label for="total"
              ><i class="fas fa-calculator"></i> Total bovin (€)</label
            >
            <input
              type="text"
              id="total"
              readonly
              value="0.00"
              style="background: #f2f8fc; font-weight: 600; color: #0f5430"
            />
          </div>

          <!-- Message de validation -->
          <div id="validationMessage" class="validation-message">
            <i class="fas fa-info-circle"></i>
            <span id="validationText">Les paiements sont cohérents</span>
          </div>

          <!-- SECTION PAIEMENT -->
          <div class="payment-section">
            <div class="payment-header">
              <div class="payment-title">
                <i class="fas fa-hand-holding-dollar"></i>
                Modes de paiement
                <span class="pay-count-badge" id="payCountBadge">1 ligne</span>
              </div>
              <button type="button" class="btn-add-payment" id="addPaymentBtn">
                <i class="fas fa-plus-circle"></i> Ajouter ligne
              </button>
            </div>

            <div class="payment-list" id="paymentList">
              <!-- Ligne initiale avec caisses dynamiques -->
              <div class="payment-row" data-row-id="1">
                <div class="pay-select">
                  <select class="pay-type">
                    <option th:each="caisse : ${caisses}" th:value="${caisse.id}" th:text="${caisse.libelle}"></option>
                  </select>
                </div>
                <div class="pay-montant">
                  <input
                    type="number"
                    class="pay-amount"
                    placeholder="0.00"
                    step="0.01"
                    min="0"
                    value="0"
                  />
                </div>
                <button type="button" class="btn-remove-pay" disabled>
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>
            </div>
            <div
              style="
                margin-top: 0.6rem;
                font-size: 0.8rem;
                color: #1f6d47;
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
              "
            >
              <span
                ><i class="fas fa-info-circle"></i> Chaque ligne = un mode de
                paiement</span
              >
              <span
                ><i class="fas fa-arrow-right"></i> Total = somme des
                montants</span
              >
            </div>
          </div>

          <!-- Total paiements -->
          <div class="total-highlight">
            <span
              ><i class="fas fa-coins" style="color: #1f8a4a"></i> Total
              paiements enregistrés</span
            >
            <span class="total-value" id="totalDisplay">0,00 €</span>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <div class="btn-group">
            <button
              type="button"
              class="btn btn-primary btn-lg"
              id="validerBtn"
            >
              <i class="fas fa-check-circle"></i> Valider l'achat
            </button>
            <button type="reset" class="btn btn-outline" id="resetBtn">
              <i class="fas fa-undo-alt"></i> Réinitialiser
            </button>
          </div>
          <span
            style="
              font-size: 0.85rem;
              color: #2b5f77;
              background: #e3f0f8;
              padding: 0.3rem 1.4rem;
              border-radius: 40px;
            "
          >
            <i class="far fa-clock"></i> Prêt
          </span>
        </div>
      </form>
    </div>
    </div>

    <!-- Toast de notification -->
    <div id="toast" class="toast-message"></div>

  <script>
    (function () {
  // Éléments
  const paymentList = document.getElementById("paymentList");
  const addPaymentBtn = document.getElementById("addPaymentBtn");
  const payCountBadge = document.getElementById("payCountBadge");
  const totalDisplay = document.getElementById("totalDisplay");
  const totalInput = document.getElementById("total");
  const prixUnitaireInput = document.getElementById("prixUnitaire");
  const qteInput = document.getElementById("quantite");
  const dateInput = document.getElementById("dateAchat");
  const validerBtn = document.getElementById("validerBtn");
  const resetBtn = document.getElementById("resetBtn");
  const toast = document.getElementById("toast");
  const poidsInput = document.getElementById("poidsAchat");
  const validationMessage = document.getElementById("validationMessage");
  const validationText = document.getElementById("validationText");
  let rowCounter = 1;

  // Initialiser la date par défaut
  if (!dateInput.value) {
    dateInput.value = new Date().toISOString().split("T")[0];
  }

  // Fonctions de calcul
  function getPaymentRows() {
    return paymentList.querySelectorAll(".payment-row");
  }

  function getPaymentTotal() {
    let sum = 0;
    getPaymentRows().forEach((row) => {
      const amt = parseFloat(row.querySelector(".pay-amount").value) || 0;
      sum += amt;
    });
    return sum;
  }

  function updateBovinTotal() {
    const pu = parseFloat(prixUnitaireInput.value) || 0;
    const qte = parseFloat(qteInput.value) || 0;
    const total = pu * qte;
    totalInput.value = total.toFixed(2);

    // Mettre à jour la validation
    validatePayments();
  }

  function validatePayments() {
    const sum = getPaymentTotal();
    const pu = parseFloat(prixUnitaireInput.value) || 0;
    const qte = parseFloat(qteInput.value) || 0;
    const prixTotal = pu * qte;

    // Afficher le total des paiements
    totalDisplay.textContent =
      sum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " €";

    // Vérification de cohérence
    const message = document.getElementById("validationMessage");
    const text = document.getElementById("validationText");

    if (prixTotal > 0 && sum > 0) {
      if (Math.abs(sum - prixTotal) < 0.01) {
        // OK - les montants correspondent
        message.className = "validation-message show success";
        text.innerHTML =
          "✅ Les paiements correspondent au total (" +
          prixTotal.toFixed(2) +
          " €)";
        totalDisplay.className = "total-value";
        totalDisplay.style.color = "#0f6e38";
        totalDisplay.style.background = "#e5f3ec";
      } else {
        // Erreur - les montants ne correspondent pas
        message.className = "validation-message show";
        const diff = Math.abs(sum - prixTotal);
        text.innerHTML =
          "⚠️ Différence de " +
          diff.toFixed(2) +
          " € entre les paiements (" +
          sum.toFixed(2) +
          " €) et le total (" +
          prixTotal.toFixed(2) +
          " €)";
        totalDisplay.className = "total-value error";
        totalDisplay.style.color = "#b34a3a";
        totalDisplay.style.background = "#fde8e3";
      }
    } else {
      message.className = "validation-message";
      totalDisplay.className = "total-value";
      totalDisplay.style.color = "#0f6e38";
      totalDisplay.style.background = "#e5f3ec";
    }

    // Mise à jour du badge
    const count = getPaymentRows().length;
    payCountBadge.textContent = count + " ligne" + (count > 1 ? "s" : "");
  }

  // Gestion des lignes de paiement
  function createPaymentRow(rowId) {
    const row = document.createElement("div");
    row.className = "payment-row";
    row.dataset.rowId = rowId;

    // Récupérer les options de caisse depuis la première ligne
    const firstSelect = document.querySelector(".pay-type");
    const optionsHtml = firstSelect
      ? firstSelect.innerHTML
      : '<option value="1">Mvola</option><option value="2">Espèce</option>';

    row.innerHTML = `
      <div class="pay-select">
        <select class="pay-type">
          ${optionsHtml}
        </select>
      </div>
      <div class="pay-montant">
        <input type="number" class="pay-amount" placeholder="0.00" step="0.01" min="0" value="0">
      </div>
      <button type="button" class="btn-remove-pay">
        <i class="fas fa-trash-alt"></i>
      </button>
    `;
    return row;
  }

  function attachRowEvents(row) {
    const amountInput = row.querySelector(".pay-amount");
    amountInput.addEventListener("input", validatePayments);

    const removeBtn = row.querySelector(".btn-remove-pay");
    removeBtn.addEventListener("click", function () {
      if (getPaymentRows().length <= 1) {
        alert("Il doit rester au moins une ligne de paiement.");
        return;
      }
      row.remove();
      validatePayments();
      updateRemoveButtons();
    });
  }

  function updateRemoveButtons() {
    const rows = getPaymentRows();
    rows.forEach((row) => {
      const btn = row.querySelector(".btn-remove-pay");
      btn.disabled = rows.length <= 1;
    });
  }

  // Ajouter une ligne
  addPaymentBtn.addEventListener("click", function () {
    rowCounter++;
    const newRow = createPaymentRow(rowCounter);
    paymentList.appendChild(newRow);
    attachRowEvents(newRow);
    validatePayments();
    updateRemoveButtons();
    // animation
    newRow.style.animation = "none";
    setTimeout(() => {
      newRow.style.animation = "fadeIn 0.25s ease";
    }, 10);
  });

  // Initialisation des lignes existantes
  function initExistingRows() {
    getPaymentRows().forEach((row) => attachRowEvents(row));
    updateRemoveButtons();
    validatePayments();
  }

  // Événements sur les champs de calcul
  prixUnitaireInput.addEventListener("input", updateBovinTotal);
  qteInput.addEventListener("input", updateBovinTotal);

  // Réinitialise l'état visuel + le bouton "Valider"
  function resetValiderBtn() {
    validerBtn.disabled = false;
    validerBtn.innerHTML =
      '<i class="fas fa-check-circle"></i> Valider l\'achat';
  }

  // Validation et envoi
  validerBtn.addEventListener("click", function () {
    const raceId = parseInt(document.getElementById("raceId").value);
    const dateAchat = dateInput.value;
    const quantite = parseInt(qteInput.value) || 0;
    const poidsAchat = parseFloat(poidsInput.value) || 0;
    const prixUnitaire = parseFloat(prixUnitaireInput.value) || 0;

    // Validations
    if (poidsAchat <= 0) {
      alert("Le poids à l'achat doit être supérieur à 0.");
      return;
    }

    if (prixUnitaire <= 0) {
      alert("Le prix unitaire doit être supérieur à 0.");
      return;
    }

    if (!dateAchat) {
      alert("Veuillez saisir une date d'achat.");
      return;
    }

    if (!raceId || raceId < 1) {
      alert("Veuillez sélectionner une race valide.");
      return;
    }

    if (quantite <= 0) {
      alert("La quantité doit être supérieure à 0.");
      return;
    }

    // Récupération des paiements
    const payments = [];
    getPaymentRows().forEach((row) => {
      const caisseId = parseInt(row.querySelector(".pay-type").value);
      const montant = parseFloat(row.querySelector(".pay-amount").value) || 0;
      if (montant > 0) {
        payments.push({ caisseId, montant });
      }
    });

    if (payments.length === 0) {
      alert("Ajoutez au moins un paiement avec un montant > 0.");
      return;
    }

    // Vérifier que le total des paiements correspond au prix total
    const totalPaiements = payments.reduce((sum, p) => sum + p.montant, 0);
    const prixTotal = prixUnitaire * quantite;
    if (Math.abs(totalPaiements - prixTotal) > 0.01) {
      alert(
        `Le total des paiements (${totalPaiements.toFixed(
          2
        )} €) ne correspond pas au prix total calculé (${prixTotal.toFixed(
          2
        )} € = ${prixUnitaire} × ${quantite}).\nVeuillez ajuster les montants.`
      );
      return;
    }

    // Construction du payload
    const payload = {
      dateAchat: dateAchat,
      raceId: raceId,
      quantite: quantite,
      poidsAchat: poidsAchat,
      prixUnitaire: prixUnitaire,
      payments: payments,
    };

    // Désactiver le bouton pendant l'envoi
    validerBtn.disabled = true;
    validerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';

    // Récupération du token CSRF injecté dans le <head> de la page
    // (voir <meta name="_csrf" .../> et <meta name="_csrf_header" .../>)
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')
      ?.content;

    // Envoi vers le serveur
    fetch("/bovins/achat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...(csrfToken && csrfHeader ? { [csrfHeader]: csrfToken } : {}),
      },
      body: JSON.stringify(payload),
    })
      .then(async (response) => {
        // On tente TOUJOURS de lire le corps JSON, que la requête
        // ait réussi (200) ou échoué côté métier (400).
        let data = null;
        try {
          data = await response.json();
        } catch (parseErr) {
          // Le corps n'est pas du JSON exploitable
          data = null;
        }

        if (!response.ok) {
          // Erreur "métier" renvoyée proprement par le contrôleur
          // (ex: solde insuffisant, montants incohérents, etc.)
          const err = new Error(
            (data && data.message) ||
              `Erreur serveur (code ${response.status})`
          );
          err.isBusinessError = true;
          throw err;
        }

        if (!data) {
          const err = new Error("Réponse du serveur invalide (JSON attendu)");
          err.isBusinessError = true;
          throw err;
        }

        return data;
      })
      .then((data) => {
        if (data.status === "success") {
          showToast(data.message, "success");
          setTimeout(() => {
            window.location.href = "/bovins";
          }, 1500);
        } else {
          // status "error" renvoyé avec un code 200 (cas rare mais géré)
          showToast("Erreur : " + data.message, "error");
          resetValiderBtn();
        }
      })
      .catch((error) => {
        if (error.isBusinessError) {
          // Vraie erreur métier : on affiche le message exact du serveur
          showToast("Erreur : " + error.message, "error");
        } else {
          // Vraie erreur réseau (serveur injoignable, CORS, timeout, etc.)
          console.error("Erreur réseau:", error);
          showToast(
            "Erreur de communication avec le serveur : " + error.message,
            "error"
          );
        }
        resetValiderBtn();
      });
  });

  // Réinitialisation
  resetBtn.addEventListener("click", function () {
    // Réinitialiser les champs
    document.getElementById("raceId").selectedIndex = 0;
    dateInput.value = new Date().toISOString().split("T")[0];
    qteInput.value = "";
    prixUnitaireInput.value = "";
    poidsInput.value = "";

    // Réinitialiser les paiements
    paymentList.innerHTML = "";
    const initialRow = createPaymentRow(1);
    paymentList.appendChild(initialRow);
    attachRowEvents(initialRow);
    rowCounter = 1;

    // Mettre à jour les affichages
    updateBovinTotal();
    validatePayments();
    updateRemoveButtons();

    // Réactiver le bouton
    resetValiderBtn();

    showToast("Formulaire réinitialisé", "success");
  });

  // Affichage toast
  function showToast(message, type) {
    toast.textContent = message;
    toast.className =
      "toast-message show" + (type === "error" ? " error" : "");
    setTimeout(() => {
      toast.classList.remove("show");
    }, 4000);
  }

  // Init
  initExistingRows();
  updateBovinTotal();
})();
  </script>
  </body>
</html>
