<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques des ventes</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Suppression de la balise </style> -->
</head>
<body>

<!-- Navbar -->
<th:block th:replace="~{fragments/common :: navbar('vente')}"></th:block>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0"><i class="bi bi-bar-chart-fill me-2" style="color:#7a9e5a;"></i>Statistiques des ventes</h4>
        <a href="/vente/list" class="btn btn-outline-primary">
            <i class="bi bi-list-ul me-1"></i>Voir la liste des ventes
        </a>
    </div>

    <!-- Filtres -->
    <div class="card p-3 p-md-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-12 col-md-3">
                <label class="form-label">Date début</label>
                <input type="date" id="dateDebut" class="form-control">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Date fin</label>
                <input type="date" id="dateFin" class="form-control">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label">Race</label>
                <select id="raceId" class="form-select">
                    <option value="">Toutes les races</option>
                    <option th:each="race : ${races}" th:value="${race.id}" th:text="${race.nom}"></option>
                </select>
            </div>
            <!-- Ajout du sélecteur de mode -->
            <div class="col-12 col-md-2">
                <label class="form-label">Mode</label>
                <select id="mode" class="form-select">
                    <option value="mois">Mois</option>
                    <option value="semaine">Semaine</option>
                    <option value="annee">Année</option>
                </select>
            </div>
            <div class="col-12 col-md-1 d-grid">
                <button id="btnFiltrer" type="button" class="btn btn-soft-primary">
                    <i class="bi bi-funnel-fill me-1"></i>Filtrer
                </button>
            </div>
        </div>
    </div>

    <!-- Cartes de synthèse -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-3">
            <div class="summary-card summary-ventes">
                <div class="label"><i class="bi bi-receipt me-1"></i>Nombre de ventes</div>
                <div class="value" id="totalVentes">–</div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="summary-card summary-bovins">
                <div class="label"><i class="bi bi-tree me-1"></i>Bovins vendus</div>
                <div class="value" id="totalBovins">–</div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="summary-card summary-montant">
                <div class="label"><i class="bi bi-wallet2 me-1"></i>Montant total</div>
                <div class="value" id="montantTotal">–</div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="summary-card summary-benefice">
                <div class="label"><i class="bi bi-currency-dollar me-1"></i>Bénéfice total</div>
                <div class="value" id="totalBenefice">–</div>
            </div>
        </div>
    </div>

    <!-- Histogramme -->
    <div class="card p-3 p-md-4">
        <div id="chartEmptyState" class="text-center text-muted py-5">
            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
            Aucune vente sur cette période.
        </div>
        <div id="chartWrapper" style="position: relative; height: 380px;">
            <canvas id="venteChart"></canvas>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const dateDebutInput = document.getElementById('dateDebut');
    const dateFinInput = document.getElementById('dateFin');
    const raceSelect = document.getElementById('raceId');
    const modeSelect = document.getElementById('mode');
    const btnFiltrer = document.getElementById('btnFiltrer');

    const totalVentesEl = document.getElementById('totalVentes');
    const totalBovinsEl = document.getElementById('totalBovins');
    const montantTotalEl = document.getElementById('montantTotal');
    const totalBeneficeEl = document.getElementById('totalBenefice');
    const chartWrapper = document.getElementById('chartWrapper');
    const chartEmptyState = document.getElementById('chartEmptyState');

    let venteChart = null;

    function formaterMontant(valeur) {
        return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(valeur || 0) + ' Ar';
    }

    function chargerStatistiques() {
        const dateDebut = dateDebutInput.value;
        const dateFin = dateFinInput.value;
        const raceId = raceSelect.value;
        const mode = modeSelect.value;

        const params = new URLSearchParams();
        if (dateDebut) params.set('dateDebut', dateDebut);
        if (dateFin) params.set('dateFin', dateFin);
        if (raceId) params.set('raceId', raceId);
        params.set('mode', mode);

        fetch('/vente/stats/data?' + params.toString())
            .then(res => res.json())
            .then(data => {
                afficherResultats(data);
            })
            .catch(() => alert("Impossible de charger les statistiques de ventes."));
    }

    function afficherResultats(data) {
        totalVentesEl.textContent = data.totalVentes || 0;
        totalBovinsEl.textContent = data.totalBovinsVendus || 0;
        montantTotalEl.textContent = formaterMontant(data.montantTotal);
        totalBeneficeEl.textContent = formaterMontant(data.totalBenefice);

        const labels = data.labels || [];

        if (labels.length === 0) {
            chartWrapper.style.display = 'none';
            chartEmptyState.style.display = 'block';
            return;
        }
        chartWrapper.style.display = 'block';
        chartEmptyState.style.display = 'none';

        const ctx = document.getElementById('venteChart').getContext('2d');

        if (venteChart) {
            venteChart.destroy();
        }

        venteChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Montant (Ar)',
                        data: data.montants,
                        backgroundColor: '#7a9e5a',
                        borderRadius: 4,
                        yAxisID: 'y',
                    },
                    {
                        label: 'Bénéfice (Ar)',
                        data: data.benefices,
                        backgroundColor: '#f0ad4e',
                        borderRadius: 4,
                        yAxisID: 'y',
                    },
                    {
                        label: 'Nombre de bovins',
                        data: data.counts,
                        backgroundColor: '#4a7a9e',
                        borderRadius: 4,
                        yAxisID: 'y1',
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                if (context.dataset.label === 'Montant (Ar)' || context.dataset.label === 'Bénéfice (Ar)') {
                                    return context.dataset.label + ' : ' + formaterMontant(context.raw);
                                }
                                return context.dataset.label + ' : ' + context.raw;
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: {
                        beginAtZero: true,
                        position: 'left',
                        ticks: { callback: (value) => formaterMontant(value) }
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        ticks: { callback: (value) => value }
                    }
                }
            }
        });
    }

    btnFiltrer.addEventListener('click', chargerStatistiques);

    // Définir les dates par défaut (début de l'année à aujourd'hui)
    const today = new Date();
    const startOfYear = new Date(today.getFullYear(), 0, 1);
    dateDebutInput.value = startOfYear.toISOString().split('T')[0];
    dateFinInput.value = today.toISOString().split('T')[0];

    // Chargement initial avec les dates par défaut
    chargerStatistiques();
</script>

</body>
</html>
