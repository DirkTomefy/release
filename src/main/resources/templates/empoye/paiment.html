<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement employé</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }

    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
    }

    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
    }

    .btn-soft-primary:hover {
      background-color: #dde8d1;
    }

    .form-control, .form-select {
      border-radius: 8px;
      border-color: #e0d8cf;
      padding: 0.6rem 1rem;
    }

    .form-control:focus, .form-select:focus {
      border-color: #b6a88e;
      box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15);
    }

    .badge-info {
      background: #eef3ea;
      color: #4a6b3a;
      padding: 0.4em 0.8em;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex align-items-center mb-4">
    <a href="#listPage" class="btn btn-soft-primary me-3">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
    <h1 class="h4 mb-0">
      <i class="bi bi-cash-coin me-2" style="color:#7a9e5a;"></i>
      Paiement employé
    </h1>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="card-body">

      <form method="post" action="/payement-employee">

        <!-- EMPLOYÉ -->
        <div class="mb-3">
          <label class="form-label">Employé</label>
          <select class="form-select" name="id_employee" required>
            <option value="">Sélectionner un employé</option>
            <option value="1">Jean Dupont</option>
            <option value="2">Marie Rakoto</option>
            <option value="3">Paul Randria</option>
          </select>
        </div>

        <!-- MOIS DE PAIEMENT -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Mois concerné</label>
            <input type="month" class="form-control" name="mois" required>
          </div>

          <!-- CAISSE -->
          <div class="col-md-6">
            <label class="form-label">Caisse</label>
            <select class="form-select" name="id_caisse" required>
              <option value="">Choisir caisse</option>
              <option value="1">Caisse principale</option>
              <option value="2">Caisse secondaire</option>
            </select>
          </div>
        </div>

        <!-- TYPE PAIEMENT -->
        <div class="mb-3">
          <label class="form-label">Type de paiement</label>
          <select class="form-select" name="type" required>
            <option value="salaire">Salaire</option>
            <option value="avance">Avance</option>
            <option value="sanction">Sanction</option>
          </select>
        </div>

        <!-- SALAIRE + MONTANT -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Salaire de base (info)</label>
            <input type="text" class="form-control" value="3 000 000 Ar" disabled>
          </div>

          <div class="col-md-6">
            <label class="form-label">Montant à payer</label>
            <input type="number" class="form-control" name="montant" placeholder="Ex: 500000" required>
          </div>
        </div>

        <!-- INFO LOGIQUE -->
        <div class="mb-3">
          <div class="alert alert-light border">
            <strong>Règles :</strong><br>
            • Si le mois est déjà payé → ignorer<br>
            • Avance possible même si salaire complet non atteint<br>
            • Sanction déduit du reste à payer<br>
            • Mise à jour automatique du reste
          </div>
        </div>

        <!-- CAISSE INFO -->
        <div class="mb-3">
          <span class="badge badge-info">
            Solde caisse actuel : 12 500 000 Ar
          </span>
        </div>

        <!-- ACTIONS -->
        <div class="text-end">
          <button type="reset" class="btn btn-light me-2">Annuler</button>
          <button type="submit" class="btn btn-soft-primary">
            <i class="bi bi-check-circle me-1"></i> Valider paiement
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
