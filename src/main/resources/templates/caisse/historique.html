<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caisse · Historique des mouvements</title>
        <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('caisse')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0">
            <i class="bi bi-clock-history me-2"></i>Historique des mouvements de caisse
        </h1>
        <div class="d-flex gap-2">
            <a href="/caisse/stats" class="btn btn-outline-secondary">
                <i class="bi bi-bar-chart-fill me-1"></i> Statistiques
            </a>
            <div class="export-group">
                <form th:action="@{/caisse/export/excel/all}" method="get">
                    <input type="hidden" name="caisseId" th:value="${criteria.caisseId}" />
                    <input type="hidden" name="causeCaisseId" th:value="${criteria.causeCaisseId}" />
                    <input type="hidden" name="dateMin" th:value="${criteria.dateMin}" />
                    <input type="hidden" name="dateMax" th:value="${criteria.dateMax}" />
                    <button type="submit" class="export-btn export-btn-excel" title="Exporter tout en Excel">
                        <i class="bi bi-file-earmark-excel"></i> Excel
                    </button>
                </form>
                <form th:action="@{/caisse/export/pdf/all}" method="get">
                    <input type="hidden" name="caisseId" th:value="${criteria.caisseId}" />
                    <input type="hidden" name="causeCaisseId" th:value="${criteria.causeCaisseId}" />
                    <input type="hidden" name="dateMin" th:value="${criteria.dateMin}" />
                    <input type="hidden" name="dateMax" th:value="${criteria.dateMax}" />
                    <button type="submit" class="export-btn export-btn-pdf" title="Exporter tout en PDF">
                        <i class="bi bi-file-earmark-pdf"></i> PDF
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Filtres de recherche -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/caisse/historique}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-md-3">
                    <label class="form-label small text-muted">Caisse</label>
                    <select name="caisseId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="c : ${caisses}" th:value="${c.id}" th:text="${c.libelle}"
                                th:selected="${criteria.caisseId != null && criteria.caisseId == c.id}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Cause</label>
                    <select name="causeCaisseId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="cause : ${causes}" th:value="${cause.id}" th:text="${cause.libelle}"
                                th:selected="${criteria.causeCaisseId != null && criteria.causeCaisseId == cause.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date min</label>
                    <input type="date" name="dateMin" class="form-control" th:value="${criteria.dateMin}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date max</label>
                    <input type="date" name="dateMax" class="form-control" th:value="${criteria.dateMax}">
                </div>
                <div class="col-md-1 d-grid">
                    <button type="submit" class="btn btn-soft-primary" title="Filtrer">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>
                <div class="col-md-1 d-grid">
                    <a href="/caisse/historique" class="btn btn-outline-secondary" title="Réinitialiser">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${mouvementPage.totalElements}">0</span> mouvement(s)
                <span class="ms-2">| Page <span th:text="${mouvementPage.number + 1}">1</span> / <span th:text="${mouvementPage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau des mouvements -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Date</th>
                    <th>Caisse</th>
                    <th>Cause</th>
                    <th class="text-end">Montant</th>
                    <th class="text-end">Sens</th>
                    <th class="text-end" style="width: 160px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${mouvementPage.content}">
                    <td class="text-muted" th:text="${m.id}">1</td>
                    <td th:text="${#dates.format(m.date, 'dd/MM/yyyy')}">15/06/2026</td>
                    <td th:text="${m.caisse != null ? m.caisse.libelle : '—'}">Caisse principale</td>
                    <td><span class="badge-cause" th:text="${m.causeCaisse != null ? m.causeCaisse.libelle : '—'}">VENTE</span></td>
                    <td th:class="${'text-end ' + (m.montant >= 0 ? 'montant-entree' : 'montant-sortie')}"
                        th:text="${#numbers.formatDecimal(m.montant, 0, 2)} + ' Ar'">150000.00 Ar</td>
                    <td class="text-end">
                        <span th:if="${m.montant >= 0}" class="badge badge-entree"><i class="bi bi-arrow-down-circle-fill me-1"></i>Entrée</span>
                        <span th:if="${m.montant lt 0}" class="badge badge-sortie"><i class="bi bi-arrow-up-circle-fill me-1"></i>Sortie</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{'/caisse/export/excel/' + ${m.id}}" class="row-action row-action-excel me-1" title="Exporter en Excel">
                            <i class="bi bi-file-earmark-excel"></i>
                        </a>
                        <a th:href="@{'/caisse/export/pdf/' + ${m.id}}" class="row-action row-action-pdf" title="Exporter en PDF">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${mouvementPage.content.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">Aucun mouvement de caisse enregistré</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${mouvementPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/caisse/historique(page=${mouvementPage.number - 1}, size=${criteria.size}, caisseId=${criteria.caisseId}, causeCaisseId=${criteria.causeCaisseId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, mouvementPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == mouvementPage.number} ? 'active'">
                <a class="page-link" th:href="@{/caisse/historique(page=${i}, size=${criteria.size}, caisseId=${criteria.caisseId}, causeCaisseId=${criteria.causeCaisseId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${mouvementPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/caisse/historique(page=${mouvementPage.number + 1}, size=${criteria.size}, caisseId=${criteria.caisseId}, causeCaisseId=${criteria.causeCaisseId}, dateMin=${criteria.dateMin}, dateMax=${criteria.dateMax})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
