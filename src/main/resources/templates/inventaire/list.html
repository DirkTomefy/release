<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Inventaires</title>
  
  <th:block th:replace="~{fragments/common :: assets}"></th:block>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }
    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .table th {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a7a72;
      font-weight: 600;
    }
    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
    }
    .btn-soft-primary:hover {
      background-color: #dde8d1;
      color: #3a562c;
    }
    .btn-soft-secondary {
      background-color: #f1ede7;
      color: #5c5c56;
      border: 1px solid #e2dac0;
      font-weight: 500;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
    }
    .btn-soft-secondary:hover {
      background-color: #e5ded4;
    }
  </style>
</head>
<body>

  <th:block th:replace="~{fragments/common :: navbar('inventaire')}"></th:block>

  <div class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
          <i class="bi bi-journal-text me-2" style="color:#7a9e5a;"></i>Historique des inventaires
        </h1>
        <p class="text-muted small mb-0">Consultez et gérez les fiches d'inventaires globaux.</p>
      </div>
      <a href="/inventaire/form" class="btn btn-soft-primary">
        <i class="bi bi-plus-circle me-1"></i> Nouvel Inventaire
      </a>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="ps-4" style="width: 100px;">ID</th>
                <th style="width: 200px;">Date d'inventaire</th>
                <th>Libellé / Référence</th>
                <th class="text-end pe-4" style="width: 150px;">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="inventaire : ${inventaires}">
                <td class="ps-4 fw-medium text-secondary" th:text="'#' + ${inventaire.getId()}"></td>
                <td th:text="${inventaire.getDateInventaire()}"></td>
                <td class="fw-medium text-dark" th:text="${inventaire.getLibelle()}"></td>
                <td class="text-end pe-4">
                  <a th:href="@{/inventaire/{id}/details(id=${inventaire.getId()})}" class="btn btn-soft-secondary btn-sm">
                    <i class="bi bi-eye me-1"></i> Voir détails
                  </a>
                </td>
              </tr>
              <tr th:if="${inventaires.isEmpty()}">
                <td colspan="4" class="text-center py-5 text-muted">
                  <i class="bi bi-inbox h3 d-block mb-2 text-secondary"></i>
                  Aucun historique d'inventaire disponible.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
