<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventaire Liste</title>

<th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>

<body>

  <th:block th:replace="~{fragments/common :: navbar('inventaire')}"></th:block>

  <div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
          <i class="bi bi-journal-text me-2" style="color:#7a9e5a;"></i>Historique des inventaires
        </h1>
        <p class="text-muted small mb-0">Consultez et gérez les fiches d'inventaires globaux.</p>
      </div>
      <div class="d-flex gap-2">
        <a href="/inventaire/form" class="btn btn-soft-primary">
          <i class="bi bi-plus-circle me-1"></i> Nouvel Inventaire
        </a>
        <div class="export-group">
          <form th:action="@{/inventaire/export/excel/all}" method="get">
            <button type="submit" class="export-btn export-btn-excel" title="Exporter tout en Excel">
              <i class="bi bi-file-earmark-excel"></i> Excel
            </button>
          </form>
          <form th:action="@{/inventaire/export/pdf/all}" method="get">
            <button type="submit" class="export-btn export-btn-pdf" title="Exporter tout en PDF">
              <i class="bi bi-file-earmark-pdf"></i> PDF
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="ps-4" style="width: 100px;">ID</th>
                <th style="width: 150px;">Date d'inventaire</th>
                <th>Libellé / Référence</th>
                <th style="width: 120px;">Qté Actuelle</th>
                <th class="text-end pe-4" style="width: 150px;">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="inventaire : ${inventaires}">
                <td class="ps-4 fw-medium text-secondary" th:text="'#' + ${inventaire.getId()}"></td>
                <td th:text="${inventaire.getDateInventaire()}"></td>
                <td class="fw-medium text-dark" th:text="${inventaire.getLibelle()}"></td>
                <td><span class="qte-badge" th:text="${currentQuantityByInventaire.get(inventaire.getId())}">0</span>
                </td>
                <td class="text-end pe-4">
                  <a th:href="@{/inventaire/{id}/details(id=${inventaire.getId()})}"
                    class="btn btn-soft-secondary btn-sm me-1" title="Voir détails">
                    <i class="bi bi-eye"></i>
                  </a>
                  <a th:href="@{'/inventaire/export/excel/' + ${inventaire.getId()}}"
                    class="row-action row-action-excel me-1" title="Exporter en Excel">
                    <i class="bi bi-file-earmark-excel"></i>
                  </a>
                  <a th:href="@{'/inventaire/export/pdf/' + ${inventaire.getId()}}" class="row-action row-action-pdf"
                    title="Exporter en PDF">
                    <i class="bi bi-file-earmark-pdf"></i>
                  </a>
                </td>
              </tr>
              <tr th:if="${inventaires.isEmpty()}">
                <td colspan="5" class="text-center py-5 text-muted">
                  <i class="bi bi-inbox h3 d-block mb-2 text-secondary"></i>
                  Aucun historique d'inventaire disponible.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
