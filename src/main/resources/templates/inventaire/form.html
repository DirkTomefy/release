<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventaire</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f9f7f4;
      color: #3e3e3b;
    }
    .card {
      border: 1px solid #e7e0d8;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .form-control {
      border-color: #e0d8cf;
      background-color: #fff;
      border-radius: 8px;
      padding: 0.6rem 1rem;
    }
    .form-control:focus {
      border-color: #b6a88e;
      box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15);
    }
    .form-control[readonly] {
      background-color: #faf8f5 !important;
      border-color: #e2ddd6;
    }
    .btn-soft-primary {
      background-color: #eef3ea;
      color: #4a6b3a;
      border: 1px solid #d2ddc4;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .btn-soft-primary:hover {
      background-color: #dde8d1;
      color: #3a562c;
    }
    .alert-custom {
      background-color: #fdf6e8;
      color: #8a6d2e;
      border: 1px solid #eddea4;
      border-radius: 12px;
      padding: 1rem 1.5rem;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    
    <th:block th:if="${materielStock == null}">
      <div class="alert-custom d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-3 fs-4"></i>
        <div>
          Le matériel sélectionné n'a encore aucune entrée en stock.
        </div>
      </div>
    </th:block>

    <th:block th:if="${materielStock != null}">
      
      <div class="mb-4">
        <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
          <i class="bi bi-boxes me-2" style="color:#7a9e5a;"></i>Inventaire du matériel
        </h1>
        <p class="text-muted small mb-0">
          Ajustement des quantités pour : <span class="fw-medium text-dark" th:text="${materielStock.getMateriel().getLibelle()}">Nom du matériel</span>
        </p>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <form id="inventaireForm" th:action="@{/inventaire/{id}(id=${materielStock.getMateriel().getId()})}" method="post">
              
            <div class="row g-3 mb-3">
              <div class="col-md-12">
                <label for="materielId" class="form-label small text-muted fw-medium">Matériel</label>
                <input type="text" id="materielId" name="materielId" class="form-control" required readonly th:value="${materielStock.getMateriel().getLibelle()}">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="qte_restant" class="form-label small text-muted fw-medium">Quantité restante (en stock)</label>
                <input type="number" id="qte_restant" name="qte_restant" class="form-control" th:value="${materielStock.getQuantiteRestant()}" required readonly>
              </div>

              <div class="col-md-6">
                <label for="qte_reelle" class="form-label small text-muted fw-medium">Quantité réelle constatée</label>
                <input type="number" id="qte_reelle" name="qte_reelle" class="form-control" placeholder="Ex: 12">
              </div>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label for="date_inventaire" class="form-label small text-muted fw-medium">Date d'inventaire</label>
                <input type="date" id="date_inventaire" name="date_inventaire" class="form-control" required>
              </div>
            </div>

            <div class="text-end border-top pt-3">
              <button type="submit" class="btn btn-soft-primary">
                <i class="bi bi-check-circle me-1"></i> Enregistrer l'inventaire
              </button>
            </div>
            
          </form>
        </div>
      </div>
    </th:block>

  </div>

  <script th:inline="javascript">
    // Initialiser automatiquement la date du jour si elle est vide
    document.addEventListener('DOMContentLoaded', function() {
      const dateInput = document.getElementById('date_inventaire');
      if (dateInput && !dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
      }
    });
  </script>
</body>
</html>
