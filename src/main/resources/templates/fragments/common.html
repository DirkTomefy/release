<!-- Fragment réutilisable : liens CDN + styles de base communs à toutes les pages.
     Inclus via th:replace="~{fragments/common :: assets}" dans le <head> de chaque page.
     Les styles spécifiques à une page restent dans un <style> séparé, propre à cette page. -->
<div th:fragment="assets">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9f7f4; color: #3e3e3b; }
        .navbar { background-color: #fff; border-bottom: 1px solid #e2ddd6; }
        .navbar-brand { font-weight: 600; color: #5b4b3a !important; }
        .nav-link { color: #6b5e53 !important; font-weight: 500; }
        .nav-link.active { color: #4a6b3a !important; border-bottom: 2px solid #7a9e5a; }
        .card { border: 1px solid #e7e0d8; border-radius: 12px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .btn-soft-primary { background-color: #eef3ea; color: #4a6b3a; border: 1px solid #d2ddc4; font-weight: 500; }
        .btn-soft-primary:hover { background-color: #dde8d1; color: #3a562c; }
        .btn-soft-warning { background-color: #fdf6e8; color: #8a6d2e; border: 1px solid #eddea4; font-weight: 500; }
        .btn-soft-danger { background-color: #fef1f1; color: #b34040; border: 1px solid #f5d2d2; font-weight: 500; }
        .form-control, .form-select { border-color: #e0d8cf; border-radius: 8px; padding: 0.6rem 1rem; }
        .form-control:focus, .form-select:focus { border-color: #b6a88e; box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15); }
        .page-link { color: #5b4b3a; border: none; border-radius: 8px; margin: 0 2px; }
        .page-item.active .page-link { background-color: #7a9e5a; border-color: #7a9e5a; color: #fff; }
    </style>
</div>

<div th:fragment="navbar(activeSection='')">
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" th:href="@{/bovins}">
                <i class="bi bi-tree-fill me-2" style="color:#7a9e5a;"></i>Élevage Bovin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'bovins'} ? ' active' : ''" th:href="@{/bovins}">Animaux</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'clients'} ? ' active' : ''" th:href="@{/clients}">Clients</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'races'} ? ' active' : ''" th:href="@{/races}">Races</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'vente'} ? ' active' : ''" th:href="@{/vente/list}">Ventes</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'mortalite'} ? ' active' : ''" th:href="@{/mortalite}">Mortalité</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'inventaire'} ? ' active' : ''" th:href="@{/inventaire/liste}">Inventaire</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'materiel'} ? ' active' : ''" th:href="@{/materiel/liste}">Matériel</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'peseBovin'} ? ' active' : ''" th:href="@{/peseBovin/list}">Pesées</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'caisse'} ? ' active' : ''" th:href="@{/caisse/stats}">Caisse</a></li>
                </ul>
            </div>
        </div>
    </nav>
</div>
