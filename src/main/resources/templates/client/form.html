<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Fiche client</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('clients')}"></th:block>

<div class="container py-4">
    <div class="d-flex align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-person-lines-fill me-2" style="color:#7a9e5a;"></i>
            <span th:text="${client.id != null} ? 'Modifier le client' : 'Nouveau client'">Fiche client</span>
        </h1>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/clients/save}" th:object="${client}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input type="text" class="form-control" id="nom" th:field="*{nom}" required>
                </div>
                <div class="mb-3">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" class="form-control" id="prenom" th:field="*{prenom}" required>
                </div>
                <div class="mb-3">
                    <label for="contact" class="form-label">Contact</label>
                    <input type="text" class="form-control" id="contact" th:field="*{contact}"
                           placeholder="ex: jean@gmail.com ou 0341234567" required>
                   <div class="form-text">
                        Email valide (sous-domaines acceptés, ex: nom@mail.univ.mg) ou numéro malgache
                        (0341234567 ou +261341234567 — espaces/tirets tolérés).
                   </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/clients" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-soft-primary">
                        <i class="bi bi-check-circle me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (function () {
        const contact = document.getElementById("contact");
        const contact_message = document.getElementById("contact_message");


        // function to verify email or numero
        function isValidContact() {
            var contact_value = contact.value.trim();

            // Email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Téléphone Madagascar
            const phoneRegex = /^(?:\+261|0)(32|33|34|37|38)\d{7}$/;

            return emailRegex.test(contact_value) || phoneRegex.test(contact_value);
        }

        // function to add message on input for contact
        function addMessageOnContact() {

            if (contact.value.trim() == "") {
                contact.classList.remove("is-valid");
                contact.classList.remove("is-invalid");
            }

            else if (isValidContact()) {
                contact.classList.remove("is-invalid");
                contact.classList.add("is-valid");
            }
            else if (!isValidContact()) {
                contact.classList.remove("is-valid");
                contact.classList.add("is-invalid");
            }
        }

        // add event listener on contact
        contact.addEventListener("blur", addMessageOnContact);
    })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
