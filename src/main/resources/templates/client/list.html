<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9f7f4; color: #3e3e3b; }
        .navbar { background-color: #fff; border-bottom: 1px solid #e2ddd6; }
        .navbar-brand { font-weight: 600; color: #5b4b3a !important; }
        .nav-link { color: #6b5e53 !important; font-weight: 500; }
        .nav-link.active { color: #4a6b3a !important; border-bottom: 2px solid #7a9e5a; }
        .card { border: 1px solid #e7e0d8; border-radius: 12px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .table thead th { background-color: #faf8f5; font-weight: 500; color: #6b5e53; border-bottom: 2px solid #e2ddd6; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.04em; }
        .table tbody td { vertical-align: middle; border-bottom: 1px solid #f0ede8; padding-top: 0.85rem; padding-bottom: 0.85rem; }
        .btn-soft-primary { background-color: #eef3ea; color: #4a6b3a; border: 1px solid #d2ddc4; font-weight: 500; }
        .btn-soft-primary:hover { background-color: #dde8d1; color: #3a562c; }
        .btn-soft-warning { background-color: #fdf6e8; color: #8a6d2e; border: 1px solid #eddea4; font-weight: 500; }
        .btn-soft-danger { background-color: #fef1f1; color: #b34040; border: 1px solid #f5d2d2; font-weight: 500; }
        .form-control, .form-select { border-color: #e0d8cf; border-radius: 8px; padding: 0.6rem 1rem; }
        .form-control:focus, .form-select:focus { border-color: #b6a88e; box-shadow: 0 0 0 0.2rem rgba(122, 158, 90, 0.15); }
        .page-link { color: #5b4b3a; border: none; border-radius: 8px; margin: 0 2px; }
        .page-item.active .page-link { background-color: #7a9e5a; border-color: #7a9e5a; color: #fff; }
        .summary-bar { background-color: #f8f6f2; border-top: 1px solid #e7e0d8; padding: 0.75rem 1.25rem; border-radius: 0 0 12px 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg py-3">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-tree-fill me-2" style="color:#7a9e5a;"></i>Élevage Bovin
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/bovins">Animaux</a></li>
                <li class="nav-item"><a class="nav-link active" href="/clients">Clients</a></li>
                <li class="nav-item"><a class="nav-link" href="/vente/new">Ventes</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-people-fill me-2" style="color:#c4a35a;"></i>Clients
        </h1>
        <a href="/clients/form" class="btn btn-soft-primary">
            <i class="bi bi-plus-circle me-1"></i> Nouveau client
        </a>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Recherche multicritère globale + filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/clients}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-md-5">
                    <label class="form-label small text-muted">Recherche globale</label>
                    <input type="text" name="search" class="form-control"
                           placeholder="Nom, prénom ou contact..." th:value="${criteria.search}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Nom</label>
                    <input type="text" name="nom" class="form-control" th:value="${criteria.nom}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Contact</label>
                    <input type="text" name="contact" class="form-control" th:value="${criteria.contact}">
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${clientPage.totalElements}">0</span> clients
                <span class="ms-2">| Page <span th:text="${clientPage.number + 1}">1</span> / <span th:text="${clientPage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Contact</th>
                    <th class="text-end" style="width: 120px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client : ${clientPage.content}">
                    <td class="text-muted" th:text="${client.id}">1</td>
                    <td class="fw-medium" th:text="${client.nom}">Rakoto</td>
                    <td th:text="${client.prenom}">Jean</td>
                    <td th:text="${client.contact}">034 00 000 00</td>
                    <td class="text-end">
                        <a th:href="@{/clients/form/{id}(id=${client.id})}" class="btn btn-soft-warning btn-sm me-1" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce client ?');">
                            <button type="submit" class="btn btn-soft-danger btn-sm" title="Supprimer">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${clientPage.content.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Aucun client trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${clientPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${clientPage.number - 1}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, clientPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == clientPage.number} ? 'active'">
                <a class="page-link" th:href="@{/clients(page=${i}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${clientPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${clientPage.number + 1}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
