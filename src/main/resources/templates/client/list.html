<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Clients</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

    <th:block th:replace="~{fragments/common :: navbar('clients')}"></th:block>

<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-people-fill me-2" style="color:#c4a35a;"></i>Clients
        </h1>
        <a href="/clients/form" class="btn btn-soft-primary">
            <i class="bi bi-plus-circle me-1"></i> Nouveau client
        </a>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Recherche multicritère globale + filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/clients}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />

                <div class="col-md-4">
                    <label class="form-label small text-muted">Recherche globale</label>
                    <input type="text" name="search" class="form-control"
                           placeholder="Nom, prénom ou contact..." th:value="${criteria.search}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Nom</label>
                    <input type="text" name="nom" class="form-control" th:value="${criteria.nom}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Contact</label>
                    <input type="text" name="contact" class="form-control" th:value="${criteria.contact}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Lignes / page</label>
                    <select name="size" class="form-select">
                        <option value="5" th:selected="${criteria.size == 5}">5</option>
                        <option value="10" th:selected="${criteria.size == 10}">10</option>
                        <option value="25" th:selected="${criteria.size == 25}">25</option>
                        <option value="50" th:selected="${criteria.size == 50}">50</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
            </form>
        </div>

        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${clientPage.totalElements}">0</span> clients
                <span class="ms-2">| Page <span th:text="${clientPage.number + 1}">1</span> / <span th:text="${clientPage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Contact</th>
                    <th class="text-end" style="width: 120px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client : ${clientPage.content}">
                    <td class="text-muted" th:text="${client.id}">1</td>
                    <td class="fw-medium" th:text="${client.nom}">Rakoto</td>
                    <td th:text="${client.prenom}">Jean</td>
                    <td th:text="${client.contact}">034 00 000 00</td>
                    <td class="text-end">
                        <a th:href="@{/clients/form/{id}(id=${client.id})}" class="btn btn-soft-warning btn-sm me-1" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce client ?');">
                            <button type="submit" class="btn btn-soft-danger btn-sm" title="Supprimer">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${clientPage.content.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Aucun client trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${clientPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${clientPage.number - 1}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, clientPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == clientPage.number} ? 'active'">
                <a class="page-link" th:href="@{/clients(page=${i}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${clientPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${clientPage.number + 1}, size=${criteria.size}, search=${criteria.search}, nom=${criteria.nom}, contact=${criteria.contact})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
