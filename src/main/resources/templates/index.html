<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Accueil · Élevage Bovin</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
  </head>
  <body>
    <th:block th:replace="~{fragments/common :: navbar('')}"></th:block>

    <div class="container py-5">
      <h1 class="h4 fw-semibold mb-4">Tableau de bord</h1>

      <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/bovins}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-tree-fill fs-3" style="color:#7a9e5a"></i>
                <div>
                  <div class="fw-semibold">Animaux</div>
                  <div class="text-muted small">Gérer les bovins</div>
                </div>
              </div>
            </div>
          </a>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/clients}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-people-fill fs-3" style="color:#5b4b3a"></i>
                <div>
                  <div class="fw-semibold">Clients</div>
                  <div class="text-muted small">Contacts et facturation</div>
                </div>
              </div>
            </div>
          </a>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/vente/list}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-cash-coin fs-3" style="color:#c4a35a"></i>
                <div>
                  <div class="fw-semibold">Ventes</div>
                  <div class="text-muted small">Créer et suivre les ventes</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/employee/list}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-people fs-3" style="color:#1f8a4a"></i>
                <div>
                  <div class="fw-semibold">Employés</div>
                  <div class="text-muted small">Gestion du personnel</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/employee/paiement}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-wallet2 fs-3" style="color:#4a6b3a"></i>
                <div>
                  <div class="fw-semibold">Paiements</div>
                  <div class="text-muted small">Enregistrer les paiements</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <a th:href="@{/contrat/form}" class="text-decoration-none">
            <div class="card p-3 h-100">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-file-earmark-text fs-3" style="color:#5b4b3a"></i>
                <div>
                  <div class="fw-semibold">Contrats</div>
                  <div class="text-muted small">Créer un contrat</div>
                </div>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>

  </body>
</html>
