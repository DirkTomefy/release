<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des matériaux</title>
  
  <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

  <th:block th:replace="~{fragments/common :: navbar('materiel')}"></th:block>

  <div class="container py-4">
    
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
        <i class="bi bi-boxes me-2" style="color:#7a9e5a;"></i>Registre et liste des matériaux
      </h1>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table table-borderless mb-0">
          <thead>
            <tr>
              <th style="width: 80px;" class="ps-4">ID</th>
              <th>Type de matériel</th>
              <th>Libellé</th>
              <th>Type de gestion</th>
              <th>Quantité restante</th>
              <th class="text-end pe-4" style="width: 320px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="materiel : ${materielStockDtos}">
              <td class="text-muted ps-4" th:text="${materiel.getMateriel().getId()}">1</td>
              
              <td>
                <span class="fw-medium" th:text="${materiel.getMateriel().getType().getLibelle()}">Alimentation</span>
              </td>
              
              <td th:text="${materiel.getMateriel().getLibelle()}">Foin de luzerne Premium</td>
              
              <td>
                <small class="text-muted" th:text="${materiel.getMateriel().getTypeGestion()}">UNITAIRE</small>
              </td>
              
              <td>
                <span class="fw-semibold" style="color: #4a6b3a;" th:text="${materiel.getQuantiteRestant()}">45</span>
              </td>
              
              <td class="text-end pe-4">
                <a th:href="@{/materiel/{id}(id=${materiel.getMateriel().getId()})}" class="btn btn-soft-warning btn-sm me-2">
                  <i class="bi bi-eye me-1"></i> Voir Détails
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
