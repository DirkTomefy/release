<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un utilisateur · Bovin Élevage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f4f1ec 0%, #e8e3dc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            width: 70px;
            height: 70px;
            background: #eef3ea;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.2rem;
            color: #4a6b3a;
        }

        .auth-header h2 {
            font-weight: 700;
            color: #2d2d2a;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .auth-header p {
            color: #6b5e53;
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-weight: 500;
            color: #3e3e3b;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .form-group label i {
            margin-right: 0.5rem;
            color: #7a9e5a;
        }

        .form-control {
            border: 1.5px solid #e2ddd6;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            background: #faf8f5;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #7a9e5a;
            box-shadow: 0 0 0 4px rgba(122, 158, 90, 0.12);
            background: white;
        }

        .roles-box {
            border: 1.5px solid #e2ddd6;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            background: #faf8f5;
        }

        .role-check {
            display: flex;
            align-items: center;
            padding: 0.35rem 0;
        }

        .role-check input {
            margin-right: 0.6rem;
        }

        .role-check label {
            margin: 0;
            font-weight: 500;
            color: #3e3e3b;
            font-size: 0.9rem;
        }

        .btn-auth {
            background: #4a6b3a;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-auth:hover {
            background: #3a562c;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(74, 107, 58, 0.25);
        }

        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }

        .alert-danger {
            background: #fef1f1;
            border: 1px solid #f5d2d2;
            color: #b34040;
        }

        .alert-success {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <div class="logo">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h2>Créer un utilisateur</h2>
        <p>Réservé à l'administrateur — choisissez le(s) rôle(s)</p>
    </div>

    <div th:if="${success}" class="alert alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}">Succès</span>
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Erreur</span>
    </div>

    <form th:action="@{/admin/users/new}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="login"><i class="bi bi-person"></i> Nom d'utilisateur</label>
            <input type="text" class="form-control" id="login" name="login" placeholder="Login" required autofocus>
        </div>

        <div class="form-group">
            <label for="password"><i class="bi bi-lock"></i> Mot de passe</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label><i class="bi bi-shield-check"></i> Rôle(s)</label>
            <div class="roles-box">
                <div class="role-check" th:each="role : ${roles}">
                    <input type="checkbox" id="role-${role.id}" name="roleIds" th:value="${role.id}">
                    <label th:for="'role-' + ${role.id}" th:text="${role.libelle}">ROLE</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-auth">
            <i class="bi bi-check2-circle me-1"></i> Créer l'utilisateur
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
