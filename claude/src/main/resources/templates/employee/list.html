<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Élevage · Liste des employés</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
  <th:block th:replace="~{fragments/common :: navbar('employee')}"></th:block>
<body>
    <div id="listContratPage">
        <div class="container py-4">
            
            <!-- Message de succès -->
            <div th:if="${successMessage}" 
                class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" 
                role="alert" style="background-color: #eef3ea; color: #3a562c; border-radius: 12px;">
                <div class="d-flex align-items-center">
                    <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h1 class="h4 fw-semibold mb-1" style="color:#4a4a44;">
                        <i class="bi bi-file-earmark-text-fill me-2" style="color:#7a9e5a;"></i>
                        Liste des employés
                    </h1>
                    <p class="text-muted mb-0">Consultez les employés enregistrés et gérez leurs contrats.</p>
                </div>
                <a href="/employee/new" class="btn btn-soft-primary">
                    <i class="bi bi-plus-circle me-1"></i>
                    Ajouter un nouvel employé
                </a>
            </div>

            <div class="card">
                <div class="card-body p-0"> <!-- p-0 évite les doubles bordures avec la table -->
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Prénom(s)</th>
                                    <th>Date de naissance</th>
                                    <th>Date d'embauche</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(employees)}">
                                    <td colspan="4" class="text-center text-muted py-4">Aucun employé enregistré pour le moment.</td>
                                </tr>
                                <tr th:each="employeeItem : ${employees}">
                                    <td class="fw-semibold" th:text="${employeeItem.nom != null ? employeeItem.nom : '-'}"></td>
                                    <td th:text="${employeeItem.prenom != null ? employeeItem.prenom : '-'}"></td>
                                    <!-- CORRECTION DES ATTRIBUTS DE DATE -->
                                    <td th:text="${employeeItem.dateNaissance != null ? #dates.format(employeeItem.dateNaissance, 'dd/MM/yyyy') : '-'}"></td>
                                    <td th:text="${employeeItem.dateEntree != null ? #dates.format(employeeItem.dateEntree, 'dd/MM/yyyy') : '-'}"></td>
                                    <td>
                                        <a href="/employee/edit/${employeeItem.id}" class="btn btn-soft-primary btn-sm">
                                            <p>voir contrat</p>
        
                                        </a>
                                        
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (Essentiel pour fermer les alertes avec la petite croix) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
