<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élevage · Pesées des bovins</title>
    <th:block th:replace="~{fragments/common :: assets}"></th:block>
</head>
<body>

<!-- Navbar -->
<th:block th:replace="~{fragments/common :: navbar('peseBovin')}"></th:block>

<!-- Contenu principal -->
<div class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <h1 class="h4 fw-semibold mb-0" style="color:#4a4a44;">
            <i class="bi bi-speedometer2 me-2" style="color:#c4a35a;"></i>Pesées des bovins
        </h1>
        <div class="d-flex gap-2">
            <a th:href="@{/peseBovin/export/excel/all(idBovin=${criteria.idBovin}, dateDebut=${criteria.dateDebut}, dateFin=${criteria.dateFin}, sort=${criteria.sort})}"
               class="btn btn-soft-primary">
                <i class="bi bi-file-earmark-excel me-1"></i> Exporter tout (Excel)
            </a>
            <a th:href="@{/peseBovin/export/pdf/all(idBovin=${criteria.idBovin}, dateDebut=${criteria.dateDebut}, dateFin=${criteria.dateFin}, sort=${criteria.sort})}"
               class="btn btn-soft-danger">
                <i class="bi bi-file-earmark-pdf me-1"></i> Exporter tout (PDF)
            </a>
            <a href="/peseBovin/form" class="btn btn-soft-primary">
                <i class="bi bi-plus-circle me-1"></i> Nouvelle pesée
            </a>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Formulaire de recherche / filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/peseBovin/list}" method="get" class="row g-3 align-items-end">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${criteria.size}" />

                <div class="col-md-2">
                    <label class="form-label small text-muted">ID Bovin</label>
                    <input type="number" name="idBovin" class="form-control" th:value="${criteria.idBovin}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Race</label>
                    <select name="raceId" class="form-select">
                        <option value="">Toutes</option>
                        <option th:each="r : ${races}" th:value="${r.id}" th:text="${r.nom}"
                                th:selected="${criteria.raceId != null && criteria.raceId == r.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date début</label>
                    <input type="date" name="dateDebut" class="form-control" th:value="${criteria.dateDebut}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Date fin</label>
                    <input type="date" name="dateFin" class="form-control" th:value="${criteria.dateFin}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted">Taille</label>
                    <input type="number" name="size" min="1" step="1" class="form-control" th:value="${criteria.size}" />
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-soft-primary w-100">
                        <i class="bi bi-funnel"></i> Filtrer
                    </button>
                </div>
            </form>
        </div>

        <!-- Barre de résumé -->
        <div class="summary-bar d-flex flex-wrap align-items-center justify-content-between">
            <div class="text-muted small">
                <span th:text="${pesePage.totalElements}">0</span> pesées
                <span class="ms-2">| Page <span th:text="${pesePage.number + 1}">1</span> / <span th:text="${pesePage.totalPages}">1</span></span>
            </div>
        </div>
    </div>

    <!-- Tableau des pesées -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-borderless mb-0">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>Bovin</th>
                    <th>Date pesée</th>
                    <th>Poids</th>
                    <th>Date de vente</th>
                    <th class="text-end" style="width: 140px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pesesBovin}">
                    <td class="text-muted" th:text="${p.id}">1</td>
                    <td>
                        <span class="fw-medium">Bovin #<span th:text="${p.bovin != null ? p.bovin.id : '-'}"></span></span>
                    </td>
                    <td th:text="${#dates.format(p.date_pese, 'dd/MM/yyyy')}">12/03/2026</td>
                    <td th:text="${#numbers.formatDecimal(p.poids_apres, 0, 1)} + ' kg'">320.5 kg</td>
                    <td>
                        <span th:if="${p.date_vente != null}" th:text="${#dates.format(p.date_vente, 'dd/MM/yyyy')}">15/06/2026</span>
                        <span th:if="${p.date_vente == null}" class="text-muted">-</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/peseBovin/export/excel/{id}(id=${p.id})}" class="btn btn-soft-primary btn-sm me-1" title="Exporter en Excel">
                            <i class="bi bi-file-earmark-excel"></i>
                        </a>
                        <a th:href="@{/peseBovin/export/pdf/{id}(id=${p.id})}" class="btn btn-soft-danger btn-sm me-1" title="Exporter en PDF">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </a>
                        <a th:href="@{/peseBovin/form/{id}(id=${p.id})}" class="btn btn-soft-warning btn-sm" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${pesesBovin.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">Aucune pesée trouvée</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${pesePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/peseBovin/list(page=${pesePage.number - 1}, size=${criteria.size}, idBovin=${criteria.idBovin}, dateDebut=${criteria.dateDebut}, dateFin=${criteria.dateFin})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, pesePage.totalPages - 1)}"
                class="page-item" th:classappend="${i == pesePage.number} ? 'active'">
                <a class="page-link" th:href="@{/peseBovin/list(page=${i}, size=${criteria.size}, idBovin=${criteria.idBovin}, dateDebut=${criteria.dateDebut}, dateFin=${criteria.dateFin})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${pesePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/peseBovin/list(page=${pesePage.number + 1}, size=${criteria.size}, idBovin=${criteria.idBovin}, dateDebut=${criteria.dateDebut}, dateFin=${criteria.dateFin})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
