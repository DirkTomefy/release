<!-- Fragment réutilisable : liens CDN + styles de base communs à toutes les pages.
     Inclus via th:replace="~{fragments/common :: assets}" dans le <head> de chaque page.
     Les styles spécifiques à une page restent dans un <style> séparé, propre à cette page. -->
<div th:fragment="assets">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
</div>

<div th:fragment="navbar(activeSection='')">
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-tree-fill me-2" style="color:#7a9e5a;"></i>Élevage Bovin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'bovins'} ? ' active' : ''" th:href="@{/bovins}">Animaux</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'clients'} ? ' active' : ''" th:href="@{/clients}">Clients</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'races'} ? ' active' : ''" th:href="@{/races}">Races</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'vente'} ? ' active' : ''" th:href="@{/vente/list}">Ventes</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'mortalite'} ? ' active' : ''" th:href="@{/mortalite}">Mortalité</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'inventaire'} ? ' active' : ''" th:href="@{/inventaire/liste}">Inventaire</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'materiel'} ? ' active' : ''" th:href="@{/materiel/liste}">Matériel</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'peseBovin'} ? ' active' : ''" th:href="@{/peseBovin/list}">Pesées</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'caisse'} ? ' active' : ''" th:href="@{/caisse/stats}">Caisse</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'paiement'} ? ' active' : ''" th:href="@{/employee/paiement}">Paiement</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'contrat'} ? ' active' : ''" th:href="@{/contrat/list}">Contrats</a></li>
                    <li class="nav-item"><a class="nav-link" th:classappend="${activeSection == 'employee'} ? ' active' : ''" th:href="@{/employee/list}">Employés</a></li>
                </ul>
            </div>
        </div>
    </nav>
</div>
